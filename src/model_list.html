<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型列表</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      overflow-y: auto;
      user-select: none;
    }

    main {
      padding: 20px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .page-title::before {
      content: "";
      display: inline-block;
      width: 4px;
      height: 18px;
      background: #6c63ff;
      border-radius: 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #16213e;
      border-radius: 8px;
      overflow: hidden;
    }

    thead {
      background: #0f3460;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      color: #a0a0c0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    th:last-child {
      text-align: center;
    }

    td {
      padding: 12px 16px;
      border-top: 1px solid #1a1a3e;
      font-size: 14px;
    }

    td:last-child {
      text-align: center;
    }

    tbody tr:hover {
      background: #1a2744;
    }

    .model-name {
      font-weight: 500;
      color: #ffffff;
    }

    .model-size {
      color: #a0a0c0;
    }

    .ram-need {
      color: #a0a0c0;
    }

    .feature-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .feature-supported {
      background: rgba(76, 175, 80, 0.15);
      color: #4caf50;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }

    .feature-unsupported {
      background: rgba(150, 150, 150, 0.1);
      color: #808080;
      border: 1px solid rgba(150, 150, 150, 0.2);
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-available {
      background: rgba(76, 175, 80, 0.15);
      color: #4caf50;
      border: 1px solid rgba(76, 175, 80, 0.3);
    }

    .status-unavailable {
      background: rgba(244, 67, 54, 0.15);
      color: #f44336;
      border: 1px solid rgba(244, 67, 54, 0.3);
    }

    .status-running {
      background: rgba(33, 150, 243, 0.15);
      color: #2196f3;
      border: 1px solid rgba(33, 150, 243, 0.3);
    }

    .btn {
      display: inline-block;
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin: 0 3px;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-download {
      background: #6c63ff;
      color: #fff;
    }

    .btn-download:hover:not(:disabled) {
      background: #5a52d5;
    }

    .btn-download.downloaded {
      background: #2e7d32;
      cursor: default;
    }

    .btn-start {
      background: #1e88e5;
      color: #fff;
    }

    .btn-start:hover:not(:disabled) {
      background: #1565c0;
    }

    .btn-view {
      background: #00897b;
      color: #fff;
    }

    .btn-view:hover:not(:disabled) {
      background: #00695c;
    }

    .btn-stop {
      background: #e53935;
      color: #fff;
    }

    .btn-stop:hover:not(:disabled) {
      background: #c62828;
    }

    .btn-log {
      background: #8e24aa;
      color: #fff;
    }

    .btn-log:hover:not(:disabled) {
      background: #6a1b9a;
    }

    .actions-cell {
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #606080;
    }

    .empty-state p {
      font-size: 14px;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(108, 99, 255, 0.3);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #c62828;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      max-width: 400px;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .log-panel {
      margin-top: 20px;
      background: #16213e;
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }

    .log-panel.visible {
      display: block;
    }

    .log-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #0f3460;
      border-bottom: 1px solid #1a1a3e;
    }

    .log-panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
    }

    .log-panel-controls {
      display: flex;
      gap: 8px;
    }

    .log-panel-btn {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .log-panel-btn-clear {
      background: #e53935;
      color: #fff;
    }

    .log-panel-btn-clear:hover {
      background: #c62828;
    }

    .log-panel-btn-export {
      background: #43a047;
      color: #fff;
    }

    .log-panel-btn-export:hover {
      background: #2e7d32;
    }

    .log-panel-btn-toggle {
      background: #1e88e5;
      color: #fff;
    }

    .log-panel-btn-toggle:hover {
      background: #1565c0;
    }

    .log-panel-content {
      padding: 12px 16px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #a0a0c0;
      background: #0d1117;
    }

    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-line.error {
      color: #ff6b6b;
    }

    .log-line.success {
      color: #69db7c;
    }

    .log-line.info {
      color: #74c0fc;
    }

    .log-line.warning {
      color: #ffd43b;
    }

    .log-line.stderr {
      color: #ff8787;
    }
  </style>
</head>
<body>
  <main>
    <div class="page-title">模型列表</div>
    <table id="model-table">
      <thead>
        <tr>
          <th>模型名称</th>
          <th>模型大小</th>
          <th>内存需求</th>
          <th>工具调用</th>
          <th>推理</th>
          <th>图片识别</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="model-tbody">
        <tr>
          <td colspan="8" style="text-align:center; padding:40px;">
            <span class="loading-spinner"></span>正在加载模型列表...
          </td>
        </tr>
      </tbody>
    </table>
    <div id="log-panel" class="log-panel">
      <div class="log-panel-header">
        <div class="log-panel-title">📋 模型启动日志 - <span id="log-model-id"></span></div>
        <div class="log-panel-controls">
          <button class="log-panel-btn log-panel-btn-export" onclick="exportLogs()">导出</button>
          <button id="log-toggle-btn" class="log-panel-btn log-panel-btn-toggle" onclick="toggleLogPanel()">隐藏</button>
          <button class="log-panel-btn log-panel-btn-clear" onclick="clearLogs()">清除</button>
        </div>
      </div>
      <div id="log-content" class="log-panel-content"></div>
    </div>
  </main>

  <script>
    const invoke = window.__TAURI_INTERNALS__?.invoke || window.__TAURI__?.core?.invoke;
    const listen = window.__TAURI_INTERNALS__?.listen || window.__TAURI__?.event?.listen;

    let modelList = [];
    let localModels = [];
    let partFiles = {};  // { model_id: existing_size }
    let systemInfo = null;
    let runningModelId = null;
    let runningModelPort = null;
    let logPanelVisible = false;
    let currentLogModelId = null;

    function formatBytes(bytes) {
      if (bytes === 0) return "0 B";
      const k = 1024;
      const sizes = ["B", "KB", "MB", "GB", "TB"];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + sizes[i];
    }

    function isModelAvailable(needRam) {
      if (!systemInfo) return false;
      const ramc = (systemInfo.total_ram + systemInfo.total_vram) / (1024 * 1024 * 1024);
      return ramc >= parseInt(needRam);
    }

    function isModelDownloaded(modelId) {
      return localModels.includes(modelId);
    }

    function showToast(message) {
      const existing = document.querySelector(".error-toast");
      if (existing) existing.remove();
      const toast = document.createElement("div");
      toast.className = "error-toast";
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    function navigateTo(page) {
      window.parent.postMessage({ type: "navigate", page: page }, "*");
    }

    // 日志面板控制
    function toggleLogPanel() {
      const panel = document.getElementById('log-panel');
      const btn = document.getElementById('log-toggle-btn');
      logPanelVisible = !logPanelVisible;
      if (logPanelVisible) {
        panel.classList.add('visible');
        btn.textContent = '隐藏';
      } else {
        panel.classList.remove('visible');
        btn.textContent = '显示';
      }
      // 保存面板状态
      localStorage.setItem('logPanelVisible', logPanelVisible);
    }

    function clearLogs() {
      document.getElementById('log-content').innerHTML = '';
      // 清除持久化存储
      localStorage.removeItem('modelLogs_' + currentLogModelId);
    }

    function addLogLine(line, type = 'info') {
      const logContent = document.getElementById('log-content');
      const logLine = document.createElement('div');
      logLine.className = 'log-line ' + type;
      logLine.textContent = line;
      logContent.appendChild(logLine);
      // 自动滚动到底部
      logContent.scrollTop = logContent.scrollHeight;
      
      // 持久化保存日志
      saveLogToStorage(line, type);
    }

    function saveLogToStorage(line, type) {
      if (!currentLogModelId) return;
      const storageKey = 'modelLogs_' + currentLogModelId;
      const logs = JSON.parse(localStorage.getItem(storageKey) || '[]');
      logs.push({ line: line, type: type, timestamp: Date.now() });
      // 限制存储大小，最多保存 5000 条
      if (logs.length > 5000) {
        logs.shift();
      }
      localStorage.setItem(storageKey, JSON.stringify(logs));
    }

    function loadLogsFromStorage(modelId) {
      const storageKey = 'modelLogs_' + modelId;
      const logs = JSON.parse(localStorage.getItem(storageKey) || '[]');
      const logContent = document.getElementById('log-content');
      logContent.innerHTML = '';
      logs.forEach(function(log) {
        const logLine = document.createElement('div');
        logLine.className = 'log-line ' + log.type;
        logLine.textContent = log.line;
        logContent.appendChild(logLine);
      });
      // 滚动到底部
      if (logContent.children.length > 0) {
        logContent.scrollTop = logContent.scrollHeight;
      }
      return logs.length;
    }

    function exportLogs() {
      if (!currentLogModelId) {
        showToast('没有可导出的日志');
        return;
      }
      const logContent = document.getElementById('log-content');
      const logLines = logContent.querySelectorAll('.log-line');
      if (logLines.length === 0) {
        showToast('日志为空，无法导出');
        return;
      }
      
      // 构建导出内容
      let exportContent = '=== ADM 模型日志 ===\n';
      exportContent += '模型: ' + currentLogModelId + '\n';
      exportContent += '导出时间: ' + new Date().toLocaleString('zh-CN') + '\n';
      exportContent += '================================\n\n';
      
      logLines.forEach(function(line) {
        exportContent += line.textContent + '\n';
      });
      
      // 创建下载文件
      const blob = new Blob([exportContent], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = currentLogModelId + '_log_' + new Date().toISOString().replace(/[:.]/g, '-') + '.log';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      
      showToast('日志已导出: ' + a.download);
    }

    function showLogPanel(modelId) {
      currentLogModelId = modelId;
      document.getElementById('log-model-id').textContent = modelId;
      document.getElementById('log-content').innerHTML = '';
      const panel = document.getElementById('log-panel');
      if (!logPanelVisible) {
        logPanelVisible = true;
        panel.classList.add('visible');
        document.getElementById('log-toggle-btn').textContent = '隐藏';
      }
      // 先加载持久化的日志
      const loadedCount = loadLogsFromStorage(modelId);
      if (loadedCount > 0) {
        addLogLine(`[${new Date().toLocaleTimeString()}] 📋 已恢复 ${loadedCount} 条历史日志`, 'info');
      }
      addLogLine(`[${new Date().toLocaleTimeString()}] 🚀 开始启动模型: ${modelId}`, 'info');
    }

    function hideLogPanel() {
      currentLogModelId = null;
      document.getElementById('log-panel').classList.remove('visible');
      logPanelVisible = false;
      document.getElementById('log-toggle-btn').textContent = '显示';
    }

    function showModelLog(modelId) {
      showLogPanel(modelId);
      addLogLine(`[${new Date().toLocaleTimeString()}] 📋 查看模型日志: ${modelId}`, 'info');
    }

    function renderModelTable() {
      const tbody = document.getElementById("model-tbody");

      if (modelList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><p>暂无可用模型</p></td></tr>';
        return;
      }

      tbody.innerHTML = "";

      modelList.forEach((model) => {
        const available = isModelAvailable(model.need_ram);
        const downloaded = isModelDownloaded(model.model_id);
        const isRunning = runningModelId === model.model_id;

        const tr = document.createElement("tr");

        let statusHtml = "";
        if (isRunning) {
          statusHtml = '<span class="status-badge status-running">已启动</span>';
        } else if (available) {
          statusHtml = '<span class="status-badge status-available">可用</span>';
        } else {
          statusHtml = '<span class="status-badge status-unavailable">不可用</span>';
        }

        // 检查是否有未完成的 .part 文件
        const partSize = partFiles[model.model_id];
        const safeModelId = model.model_id.replace(/"/g, '"');
        let downloadBtnHtml = "";
        if (downloaded) {
          downloadBtnHtml = '<button class="btn btn-download downloaded" disabled>已下载</button>';
        } else if (partSize && partSize > 0) {
          downloadBtnHtml = '<button class="btn btn-download" data-model-id="' + safeModelId + '" data-model-url="' + model.model_url.replace(/"/g, '"') + '" onclick="handleDownload(this)">继续下载</button>';
        } else if (available) {
          downloadBtnHtml = '<button class="btn btn-download" data-model-id="' + safeModelId + '" data-model-url="' + model.model_url.replace(/"/g, '"') + '" onclick="handleDownload(this)">下载</button>';
        } else {
          downloadBtnHtml = '<button class="btn btn-download" disabled>下载</button>';
        }

        let actionsHtml = "";
        if (isRunning) {
          actionsHtml = '<button class="btn btn-view" onclick="goModel(\'' + model.model_id.replace(/'/g, "\\'") + '\')">查看模型</button>';
          actionsHtml += '<button class="btn btn-log" onclick="showModelLog(\'' + model.model_id.replace(/'/g, "\\'") + '\')">日志</button>';
          actionsHtml += '<button class="btn btn-stop" data-stop-btn="' + safeModelId + '" onclick="handleStop(this)">关闭模型</button>';
        } else if (downloaded && available) {
          actionsHtml = '<button class="btn btn-start" data-start-btn="' + safeModelId + '" onclick="handleStart(this)">启动</button>';
        } else if (downloaded) {
          actionsHtml = '<button class="btn btn-start" disabled>启动</button>';
        } else {
          actionsHtml = '';
        }

        const toolsBadge = model.support_tools
          ? '<span class="feature-badge feature-supported">支持</span>'
          : '<span class="feature-badge feature-unsupported">不支持</span>';

        const reasoningBadge = model.support_reasoning
          ? '<span class="feature-badge feature-supported">支持</span>'
          : '<span class="feature-badge feature-unsupported">不支持</span>';

        const imagesBadge = model.support_images
          ? '<span class="feature-badge feature-supported">支持</span>'
          : '<span class="feature-badge feature-unsupported">不支持</span>';

        tr.innerHTML =
          '<td class="model-name">' + model.model_id + '</td>' +
          '<td class="model-size">' + model.model_size + '</td>' +
          '<td class="ram-need">' + model.need_ram + ' GB</td>' +
          '<td>' + toolsBadge + '</td>' +
          '<td>' + reasoningBadge + '</td>' +
          '<td>' + imagesBadge + '</td>' +
          '<td>' + statusHtml + '</td>' +
          '<td class="actions-cell">' + downloadBtnHtml + ' ' + actionsHtml + '</td>';

        tbody.appendChild(tr);
      });
    }

    async function handleDownload(btn) {
      const modelId = btn.dataset.modelId;
      const modelUrl = btn.dataset.modelUrl;
      if (btn) {
        // 如果有 part 文件，显示 "续传中..." 而不是 "0%"
        const hasPart = partFiles[modelId] && partFiles[modelId] > 0;
        btn.textContent = hasPart ? "继续下载中..." : "0%";
        btn.disabled = true;
      }

      try {
        await invoke("download_model", { modelId: modelId, modelUrl: modelUrl });
      } catch (e) {
        showToast("下载失败: " + e);
        if (btn) {
          btn.textContent = "下载";
          btn.disabled = false;
        }
      }
    }

    async function handleStart(btn) {
      const modelId = btn.dataset.startBtn;
      try {
        const settings = await invoke("load_settings");
        console.log("[DEBUG] load_settings returned:", JSON.stringify(settings));
        const params = settings.launch_params || settings.launchParams;
        console.log("[DEBUG] params to pass:", JSON.stringify(params));

        if (!params) {
          console.error("[DEBUG] params is undefined! settings keys:", Object.keys(settings));
        }

        btn.textContent = "启动中...";
        btn.disabled = true;

        await invoke("start_model", { modelId: modelId, params: params });
      } catch (e) {
        showToast("启动失败: " + e);
        renderModelTable();
      }
    }

    async function handleStop(btn) {
      try {
        await invoke("stop_model");
        runningModelId = null;
        runningModelPort = null;
        renderModelTable();
      } catch (e) {
        showToast("停止失败: " + e);
      }
    }

    function goModel(modelId) {
      const port = runningModelPort || 8080;
      navigateTo("model_chat.html?model_id=" + encodeURIComponent(modelId) + "&port=" + port);
    }

    async function init() {
      try {
        systemInfo = await invoke("get_system_info");

        try {
          const gpuInfo = await invoke("plugin:hwinfo|get_gpu_info");
          if (gpuInfo && gpuInfo.vramMb) {
            systemInfo.total_vram = gpuInfo.vramMb * 1024 * 1024;
            systemInfo.has_gpu = true;
          }
        } catch (_) {}

        try {
          const ramInfo = await invoke("plugin:hwinfo|get_ram_info");
          if (ramInfo && ramInfo.sizeMb) {
            systemInfo.total_ram = ramInfo.sizeMb * 1024 * 1024;
          }
        } catch (_) {}
      } catch (e) {
        console.error("获取系统信息失败:", e);
      }

      try {
        localModels = await invoke("scan_local_models");
      } catch (e) {
        console.error("扫描本地模型失败:", e);
      }

      // 扫描未完成的 .part 文件，恢复进度显示
      try {
        const parts = await invoke("scan_part_files");
        partFiles = {};
        for (const p of parts) {
          partFiles[p.model_id] = p.existing_size;
        }
      } catch (e) {
        console.error("扫描未完成下载失败:", e);
      }

      try {
        const status = await invoke("get_model_status");
        if (status.running) {
          runningModelId = status.model_id;
          runningModelPort = status.port;
          // 恢复日志面板状态
          const savedVisible = localStorage.getItem('logPanelVisible');
          if (savedVisible === 'true') {
            logPanelVisible = true;
            document.getElementById('log-panel').classList.add('visible');
            document.getElementById('log-toggle-btn').textContent = '隐藏';
          }
        }
      } catch (e) {
        console.error("获取模型状态失败:", e);
      }

      try {
        modelList = await invoke("fetch_model_list");
      } catch (e) {
        showToast("获取模型列表失败: " + e);
      }

      renderModelTable();
    }

    // 通过 postMessage 接收主窗口转发的 Tauri 事件
    function setupMessageListener() {
      window.addEventListener("message", function (event) {
        const data = event.data;
        if (!data || !data.type || !data.payload) return;

        const { model_id, progress, error, port } = data.payload;

        switch (data.type) {
          case "download-progress": {
            const btn = document.querySelector('[data-model-id="' + model_id + '"]');
            if (btn) {
              btn.textContent = progress + "%";
            }
            break;
          }
          case "download-complete": {
            if (!localModels.includes(model_id)) {
              localModels.push(model_id);
            }
            // 清理 partFiles 记录
            delete partFiles[model_id];
            renderModelTable();
            break;
          }
          case "download-error": {
            showToast("下载失败 [" + model_id + "]: " + error);
            renderModelTable();
            break;
          }
          case "model-log": {
            // 接收模型启动日志
            const logLine = payload?.line;
            const source = payload?.source || 'stdout';
            if (logLine) {
              // 根据日志内容判断类型
              let logType = 'info';
              if (source === 'stderr') {
                logType = 'stderr';
              } else if (logLine.includes('error') || logLine.includes('Error') || logLine.includes('ERROR')) {
                logType = 'error';
              } else if (logLine.includes('warning') || logLine.includes('Warning') || logLine.includes('WARN')) {
                logType = 'warning';
              } else if (logLine.includes('success') || logLine.includes('Success') || logLine.includes('SUCCESS') || 
                         logLine.includes('listening') || logLine.includes('started')) {
                logType = 'success';
              }
              addLogLine(`[${new Date().toLocaleTimeString()}] ${logLine}`, logType);
            }
            break;
          }
          case "model-started": {
            runningModelId = model_id;
            runningModelPort = port;
            renderModelTable();
            // 显示日志面板
            showLogPanel(model_id);
            addLogLine(`[${new Date().toLocaleTimeString()}] ✅ 模型启动成功! 端口: ${port}`, 'success');
            break;
          }
          case "model-stopped": {
            runningModelId = null;
            runningModelPort = null;
            renderModelTable();
            addLogLine(`[${new Date().toLocaleTimeString()}] ⏹️ 模型已停止`, 'info');
            // 3秒后自动隐藏日志面板
            setTimeout(() => {
              if (currentLogModelId === model_id) {
                hideLogPanel();
              }
            }, 3000);
            break;
          }
          case "model-error": {
            showToast("模型错误 [" + model_id + "]: " + error);
            addLogLine(`[${new Date().toLocaleTimeString()}] ❌ 模型错误: ${error}`, 'error');
            break;
          }
        }
      });
    }

    setupMessageListener();
    init();
  </script>
</body>
</html>
