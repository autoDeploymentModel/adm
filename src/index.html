<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #content-frame, #agent-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #1a1a2e;
    }
    #agent-frame { display: none; }

    #hardware-bar {
      display: flex;
      align-items: center;
      gap: 0;
      background: #0f3460;
      padding: 4px 16px;
      font-size: 12px;
      color: #a0a0c0;
      border-top: 1px solid #1a1a3e;
      flex-shrink: 0;
    }


    #home-btn,
    #settings-btn,
    #agent-btn {
      cursor: pointer;
      font-size: 13px;
      padding: 2px 10px;
      border-right: 1px solid #2a2a4e;
      margin-right: 10px;
      transition: color 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .btn-icon {
      font-size: 20px;
      line-height: 1;
    }

    .btn-text {
      font-size: 11px;
      font-weight: 500;
    }

    #home-btn:hover,
    #settings-btn:hover,
    #agent-btn:hover {
      color: #6c63ff;
    }

    /* 当前选中项：柔和紫色高亮背景 */
    #home-btn.active,
    #settings-btn.active,
    #agent-btn.active {
      background: rgba(108, 99, 255, 0.20);
      color: #ffffff;
      border-radius: 6px;
      border-right-color: transparent;
    }
    #home-btn.active .btn-icon,
    #settings-btn.active .btn-icon,
    #agent-btn.active .btn-icon {
      color: #6c63ff;
    }

    #hw-items {
      display: flex;
      align-items: center;
      margin-left: auto;
    }

    .hw-item {
      padding: 0 12px;
      border-right: 1px solid #2a2a4e;
    }

    .hw-item:last-child {
      border-right: none;
    }

    .hw-label {
      color: #c0c0e0;
      margin-right: 4px;
      white-space: nowrap;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
      vertical-align: bottom;
    }

    .hw-value {
      color: #f0f0ff;
      font-weight: 600;
    }

    /* 更新弹窗样式 */
    #update-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    #update-overlay.show {
      display: flex;
    }
    #update-dialog {
      background: #16213e;
      border: 1px solid #2a2a4e;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #update-dialog .update-icon {
      font-size: 40px;
      text-align: center;
      margin-bottom: 12px;
    }
    #update-dialog .update-title {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      text-align: center;
      margin-bottom: 8px;
    }
    #update-dialog .update-desc {
      font-size: 14px;
      color: #a0a0c0;
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    #update-dialog .update-info-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 20px;
      font-size: 13px;
    }
    #update-dialog .update-info-row .info-item {
      text-align: center;
    }
    #update-dialog .update-info-row .info-label {
      color: #8080a0;
      font-size: 11px;
    }
    #update-dialog .update-info-row .info-value {
      color: #e0e0e0;
      font-weight: 500;
      margin-top: 2px;
    }
    #update-dialog .update-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    #update-dialog .update-btn-primary {
      background: #6c63ff;
      color: #fff;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    #update-dialog .update-btn-primary:hover {
      background: #5a52d5;
    }
    #update-dialog .update-btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      border: none;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #update-dialog .update-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    #update-dialog .checking-text {
      text-align: center;
      color: #8080a0;
      font-size: 14px;
      padding: 20px 0;
    }
    #update-dialog .checking-text .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #2a2a4e;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .llamacpp-progress-bar {
      width: 100%;
      height: 6px;
      background: #2a2a4e;
      border-radius: 3px;
      margin-top: 12px;
      overflow: hidden;
    }
    .llamacpp-progress-fill {
      height: 100%;
      background: #6c63ff;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .llamacpp-status-text {
      font-size: 12px;
      color: #8080a0;
      margin-top: 6px;
      text-align: center;
    }

    /* Agent 下载弹窗 */
    #agent-download-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 9998;
      justify-content: center;
      align-items: center;
    }
    #agent-download-overlay.show {
      display: flex;
    }
    .agent-download-dialog {
      background: #16213e;
      border: 1px solid #2a2a4e;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      text-align: center;
    }
    .agent-download-dialog .ad-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .agent-download-dialog .ad-title {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
    }
    .agent-download-dialog .ad-desc {
      font-size: 14px;
      color: #a0a0c0;
      margin-bottom: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <!-- 更新弹窗 -->
  <div id="update-overlay">
    <div id="update-dialog">
      <div id="update-content">
        <!-- 动态填充 -->
      </div>
    </div>
  </div>

  <!-- Agent 下载弹窗 -->
  <div id="agent-download-overlay">
    <div class="agent-download-dialog">
      <div class="ad-icon">🤖</div>
      <div class="ad-title">正在下载 Agent 工具</div>
      <div class="ad-desc">首次使用需要下载 admAgent 工具，下载完成后将自动进入 Agent 终端。</div>
      <div class="llamacpp-progress-bar">
        <div class="llamacpp-progress-fill" id="agent-progress-fill" style="width: 0%"></div>
      </div>
      <div class="llamacpp-status-text" id="agent-status-text">准备下载...</div>
    </div>
  </div>

  <div id="app">
    <iframe id="content-frame" src="model_list.html"></iframe>
    <iframe id="agent-frame" style="display:none"></iframe>
    <div id="hardware-bar">
      <div id="home-btn" onclick="goHome()">
        <span class="btn-icon">&#8962;</span>
        <span class="btn-text">首页</span>
      </div>
      <div id="settings-btn" onclick="goSettings()">
        <span class="btn-icon">&#9881;</span>
        <span class="btn-text">设置</span>
      </div>
      <div id="agent-btn" onclick="goAgent()">
        <span class="btn-icon">&#129302;</span>
        <span class="btn-text">Agent</span>
      </div>
      <div id="hw-items">
        <div class="hw-item">
          <span class="hw-label">内存</span>
          <span class="hw-value" id="ram-info">--</span>
        </div>
        <div class="hw-item">
          <span class="hw-label" id="gpu-label">显存</span>
          <span class="hw-value" id="vram-info">--</span>
        </div>
        <div class="hw-item">
          <span class="hw-label">CPU</span>
          <span class="hw-value" id="cpu-info">--</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const invoke = (function() {
      var fn = window.__TAURI__?.core?.invoke || window.__TAURI_INTERNALS__?.invoke;
      if (typeof fn === 'function') return fn;
      return function() {
        var f = window.__TAURI__?.core?.invoke || window.__TAURI_INTERNALS__?.invoke;
        if (typeof f !== 'function') throw new Error('Tauri IPC 未初始化');
        return f.apply(null, arguments);
      };
    })();

    const listen = (function() {
      var fn = window.__TAURI__?.event?.listen || window.__TAURI_INTERNALS__?.listen;
      if (typeof fn === 'function') return fn;
      return function() {
        var f = window.__TAURI__?.event?.listen || window.__TAURI_INTERNALS__?.listen;
        if (typeof f !== 'function') throw new Error('Tauri Event 未初始化');
        return f.apply(null, arguments);
      };
    })();

    let systemInfo = null;
    let hwinfo = {
      cpu: null,
      ram: null,
      gpu: null,
      os: null
    };
    let llamacppIsMandatory = false;

    function formatBytes(bytes) {
      if (bytes === 0) return "0 B";
      const k = 1024;
      const sizes = ["B", "KB", "MB", "GB", "TB"];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + sizes[i];
    }

    // 页面显隐切换：content-frame 与常驻 agent-frame 二选一可见
    function showContentFrame() {
      const cf = document.getElementById("content-frame");
      const af = document.getElementById("agent-frame");
      // 用显式值覆盖样式表规则，避免清空内联样式后被 CSS 的 display:none 命中
      if (af) af.style.display = "none";
      if (cf) cf.style.display = "block";
    }

    function showAgentFrame() {
      const cf = document.getElementById("content-frame");
      const af = document.getElementById("agent-frame");
      if (cf) cf.style.display = "none";
      if (af) {
        // 必须用显式 block，否则会被样式表里的 #agent-frame{display:none} 覆盖导致黑屏
        af.style.display = "block";
        setActiveNav("agent-btn");
        try { af.focus(); } catch (_) {}
      }
      // 显示后通知 agent 页面重新自适应尺寸
      setTimeout(function () {
        if (af && af.contentWindow) af.contentWindow.postMessage({ type: "agent-resize" }, "*");
      }, 60);
    }

    // 首次进入时懒加载 agent 页面（之后常驻，不再重新加载）
    var agentFrameLoaded = false;
    function ensureAgentFrame() {
      const af = document.getElementById("agent-frame");
      if (af && !agentFrameLoaded) {
        af.src = "agent.html";
        agentFrameLoaded = true;
      }
    }

    // 更新底部导航栏的选中态（深色背景）
    function setActiveNav(id) {
      ["home-btn", "settings-btn", "agent-btn"].forEach(function (b) {
        const el = document.getElementById(b);
        if (el) el.classList.toggle("active", b === id);
      });
    }

    function goHome() {
      showContentFrame();
      setActiveNav("home-btn");
      document.getElementById("content-frame").src = "model_list.html";
    }

    function goSettings() {
      showContentFrame();
      setActiveNav("settings-btn");
      document.getElementById("content-frame").src = "settings.html";
    }

    async function goAgent() {
      try {
        // 平台判断：仅 Windows 支持 Agent 终端，其它系统提示即将开放
        const osName = String(await invoke("get_platform_os")).toLowerCase();
        if (osName !== "windows") {
          showComingSoon();
          return;
        }
        // 点击 Agent 即先生成 / 更新 admAgent.json 配置（早于终端真正启动）
        try {
          await invoke("prepare_adm_agent_config");
        } catch (_) {}
        // 优先级 1：模型是否启动（未启动则不允许进入 Agent）
        const running = await invoke("is_model_running");
        if (!running) {
          showComingSoon("请先启动模型");
          return;
        }
        // 优先级 2：本地是否已下载 admAgent（未下载则首次安装）
        const info = await invoke("check_adm_agent");
        if (!info.exists) {
          showAgentDownloadDialog();
          await invoke("download_adm_agent");
          // 下载完成，隐藏弹窗并进入 Agent 页面（常驻，不重复加载）
          setTimeout(function () {
            hideAgentDownloadDialog();
            ensureAgentFrame();
            showAgentFrame();
          }, 700);
          return;
        }

        // 优先级 3：版本号判断（与远程比对，仅 Windows 需要更新）
        const upd = await invoke("check_adm_agent_update");
        if (upd.needs_update && upd.download_url) {
          // 弹出更新进度框，下载完成后进入 Agent 页面
          startAdmAgentUpdate(upd, function () {
            ensureAgentFrame();
            showAgentFrame();
          });
          return;
        }

        // 已是最新，直接进入 Agent 页面
        ensureAgentFrame();
        showAgentFrame();
      } catch (e) {
        hideAgentDownloadDialog();
        showComingSoon("操作失败: " + e);
      }
    }

    // 进入 Agent 时的轻量提示（可自定义文案，默认「该功能即将开放，敬请期待」）
    function showComingSoon(msg) {
      let tip = document.getElementById("os-tip");
      if (!tip) {
        tip = document.createElement("div");
        tip.id = "os-tip";
        tip.style.cssText =
          "position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);" +
          "background:rgba(20,20,40,0.96);color:#e0e0e0;padding:18px 28px;" +
          "border-radius:10px;font-size:15px;z-index:9999;border:1px solid #4a4a7e;" +
          "box-shadow:0 8px 30px rgba(0,0,0,0.5);cursor:default;";
        document.body.appendChild(tip);
      }
      tip.textContent = msg || "该功能即将开放，敬请期待";
      tip.style.display = "block";
      clearTimeout(showComingSoon._t);
      showComingSoon._t = setTimeout(function () {
        tip.style.display = "none";
      }, 2500);
    }

    function showAgentDownloadDialog() {
      const fill = document.getElementById("agent-progress-fill");
      const text = document.getElementById("agent-status-text");
      if (fill) fill.style.width = "0%";
      if (text) {
        text.textContent = "准备下载...";
        text.style.color = "#8080a0";
      }
      document.getElementById("agent-download-overlay").classList.add("show");
    }

    function hideAgentDownloadDialog() {
      document.getElementById("agent-download-overlay").classList.remove("show");
    }

    function updateAgentDownloadStatus(msg, isError) {
      const text = document.getElementById("agent-status-text");
      if (text) {
        text.textContent = msg;
        if (isError) text.style.color = "#ff6b6b";
      }
    }

    function setupAgentDownloadListener() {
      if (typeof listen !== "function") return;
      try {
        listen("agent-download-progress", function (event) {
          const payload = event.payload || {};
          const fill = document.getElementById("agent-progress-fill");
          const text = document.getElementById("agent-status-text");
          if (payload.status === "downloading") {
            if (text) text.textContent = "正在下载... " + payload.progress + "%";
            if (fill) fill.style.width = payload.progress + "%";
          } else if (payload.status === "done") {
            if (text) text.textContent = "下载完成！";
            if (fill) fill.style.width = "100%";
          }
        });
      } catch (_) {}
    }

    // 将 Agent 终端事件转发给常驻的 agent iframe
    function setupAgentTerminalEventForwarding() {
      if (typeof listen !== "function") return;
      try {
        listen("agent-terminal-data", function (event) {
          const frame = document.getElementById("agent-frame");
          if (frame && frame.contentWindow) {
            frame.contentWindow.postMessage({ type: "agent-terminal-data", payload: event.payload }, "*");
          }
        });
        listen("agent-terminal-exit", function (event) {
          const frame = document.getElementById("agent-frame");
          if (frame && frame.contentWindow) {
            frame.contentWindow.postMessage({ type: "agent-terminal-exit", payload: event.payload }, "*");
          }
        });
        listen("agent-terminal-ready", function (event) {
          const frame = document.getElementById("agent-frame");
          if (frame && frame.contentWindow) {
            frame.contentWindow.postMessage({ type: "agent-terminal-ready", payload: event.payload }, "*");
          }
        });
      } catch (_) {}
    }

    function updateHardwareBar() {
      if (!systemInfo) return;

      try {
        const ramTotal = formatBytes(systemInfo.total_ram);
        document.getElementById("ram-info").textContent = ramTotal;

        if (systemInfo.has_gpu && systemInfo.total_vram > 0) {
          const vramTotal = formatBytes(systemInfo.total_vram);
          document.getElementById("vram-info").textContent = vramTotal;
          if (hwinfo.gpu && hwinfo.gpu.model) {
            document.getElementById("gpu-label").textContent = hwinfo.gpu.model;
          }
        } else {
          document.getElementById("vram-info").textContent = "无显卡";
        }

        const cpuCores = systemInfo.cpu_physical_cores;
        const cpuThreads = systemInfo.cpu_logical_cores;
        if (hwinfo.cpu && hwinfo.cpu.model) {
          document.getElementById("cpu-info").textContent = hwinfo.cpu.model + " " + cpuCores + "C/" + cpuThreads + "T";
        } else {
          document.getElementById("cpu-info").textContent = cpuCores + "C/" + cpuThreads + "T";
        }
      } catch (e) {
        console.error("更新硬件栏失败:", e);
        document.getElementById("ram-info").textContent = "错误";
        document.getElementById("vram-info").textContent = "错误";
        document.getElementById("cpu-info").textContent = "错误";
      }
    }

    window.addEventListener("message", function (event) {
      if (event.data && event.data.type === "navigate") {
        showContentFrame();
        setActiveNav("home-btn");
        document.getElementById("content-frame").src = event.data.page;
      }
      if (event.data && event.data.type === "show-update-dialog") {
        const result = event.data.result;
        const html = `
          <div class="update-icon">📥</div>
          <div class="update-title">发现新版本</div>
          <div class="update-desc">有新版本可用，是否前往下载？</div>
          <div class="update-info-row">
            <div class="info-item">
              <div class="info-label">当前版本</div>
              <div class="info-value">v${result.current_version}</div>
            </div>
            <div class="info-item">
              <div class="info-label">最新版本</div>
              <div class="info-value">v${result.remote_version}</div>
            </div>
          </div>
          <div class="update-buttons">
            <button class="update-btn-primary" onclick="openUrl('${result.download_url}')">下载更新</button>
            <button class="update-btn-secondary" onclick="hideUpdateDialog()">稍后再说</button>
          </div>
        `;
        showUpdateDialog(html);
      }
      // iframe IPC 调用代理：iframe 无法直接访问 Tauri IPC 时通过此通道调用
      if (event.data && event.data.type === "__invoke__") {
        const { cmd, args, id } = event.data;
        Promise.resolve(invoke(cmd, args)).then(function(result) {
          event.source.postMessage({ type: "__invoke_result__", id: id, result: result, error: null }, "*");
        }).catch(function(err) {
          event.source.postMessage({ type: "__invoke_result__", id: id, result: null, error: String(err) }, "*");
        });
      }
      // Agent 页面请求父窗口把键盘焦点交给 iframe（内嵌终端需要焦点才能接收按键）
      if (event.data && event.data.type === "agent-focus-me") {
        const f = document.getElementById("agent-frame");
        if (f) {
          try { f.focus(); } catch (_) {}
          try { if (f.contentWindow) f.contentWindow.focus(); } catch (_) {}
        }
      }
      // Agent 页面（iframe）内剪贴板受限时，由父窗口代理读取系统剪贴板
      if (event.data && event.data.type === "agent-read-clipboard") {
        const id = event.data.id;
        const frame = document.getElementById("agent-frame");
        const send = function (text, error) {
          if (frame && frame.contentWindow) {
            frame.contentWindow.postMessage({ type: "agent-clipboard-result", id: id, text: text, error: error }, "*");
          }
        };
        if (navigator.clipboard && navigator.clipboard.readText) {
          navigator.clipboard.readText()
            .then(function (t) { send(t, null); })
            .catch(function (err) { send(null, String(err)); });
        } else {
          send(null, "剪贴板不可用");
        }
      }
    });

    // 监听 Tauri 事件并转发给 content-frame iframe（下载进度等）
    function forwardEvent(eventName) {
      try {
        listen(eventName, function (event) {
          var frame = document.getElementById("content-frame");
          if (frame && frame.contentWindow) {
            frame.contentWindow.postMessage({ type: eventName, payload: event.payload }, "*");
          }
        });
      } catch (_) {}
    }

    function setupEventForwarding() {
      if (typeof listen !== "function") return;
      [
        "download-progress",
        "download-complete",
        "download-error",
        "model-started",
        "model-stopped",
        "model-error",
        "model-log",
        "sd-download-progress",
        "sd-log",
        "sd-started",
        "sd-complete",
        "sd-error",
        "sd-image-result",
      ].forEach(forwardEvent);
    }

    // ===== 自动更新相关 =====

    function showUpdateDialog(html) {
      document.getElementById("update-content").innerHTML = html;
      document.getElementById("update-overlay").classList.add("show");
    }

    function hideUpdateDialog() {
      if (llamacppIsMandatory || vcRedistMandatory) {
        // 强制安装时不能关闭对话框
        return;
      }
      document.getElementById("update-overlay").classList.remove("show");
    }

    function openUrl(url) {
      if (window.__TAURI__?.core) {
        window.__TAURI__.core.invoke("plugin:opener|open_url", { url: url });
      } else if (window.__TAURI_INTERNALS__?.invoke) {
        window.__TAURI_INTERNALS__.invoke("plugin:opener|open_url", { url: url });
      } else {
        window.open(url, "_blank");
      }
    }

    let pendingLlamacppResult = null;
    let vcRedistMandatory = false;

    async function checkForUpdate(silent) {
      silent = silent || false;
      try {
        if (!silent) {
          showUpdateDialog('<div class="checking-text"><span class="spinner"></span>正在检查更新...</div>');
        }
        const result = await invoke("check_update");

        if (result.has_update) {
          pendingLlamacppResult = result;
          const html = `
            <div class="update-icon">📥</div>
            <div class="update-title">发现新版本</div>
            <div class="update-desc">有新版本可用，是否前往下载？</div>
            <div class="update-info-row">
              <div class="info-item">
                <div class="info-label">当前版本</div>
                <div class="info-value">v${result.current_version}</div>
              </div>
              <div class="info-item">
                <div class="info-label">最新版本</div>
                <div class="info-value">v${result.remote_version}</div>
              </div>
            </div>
            <div class="update-buttons">
              <button class="update-btn-primary" onclick="openUrl('${result.download_url}')">下载更新</button>
              <button class="update-btn-secondary" onclick="onSystemUpdateDismiss()">稍后再说</button>
            </div>
          `;
          showUpdateDialog(html);
          return;
        }

        if (!result.vc_redist_installed) {
          pendingLlamacppResult = result.llamacpp_needs_update ? result : null;
          showVcRedistInstallDialog();
          return;
        }

        if (result.llamacpp_needs_update) {
          startLlamacppUpdate(result);
          return;
        }

        if (!silent) {
          showUpdateDialog(`
            <div class="update-icon">✅</div>
            <div class="update-title">已是最新版本</div>
            <div class="update-desc">当前版本 v${result.current_version} 已是最新</div>
            <div class="update-buttons" style="margin-top:16px;">
              <button class="update-btn-secondary" onclick="hideUpdateDialog()">确定</button>
            </div>
          `);
        }
      } catch (e) {
        if (!silent) {
          showUpdateDialog(`
            <div class="update-icon">❌</div>
            <div class="update-title">检查更新失败</div>
            <div class="update-desc">${e}</div>
            <div class="update-buttons" style="margin-top:16px;">
              <button class="update-btn-secondary" onclick="hideUpdateDialog()">确定</button>
            </div>
          `);
        }
      }
    }

    function showVcRedistInstallDialog() {
      vcRedistMandatory = true;
      const html = `
        <div class="update-icon">📦</div>
        <div class="update-title">需要安装 VC++ 运行库</div>
        <div class="update-desc">检测到系统未安装 Visual C++ 2015-2022 运行库，这是运行 llama-server 的必要组件。</div>
        <div class="update-buttons" style="margin-top:16px;">
          <button class="update-btn-primary" onclick="downloadVcRedist()">下载安装</button>
        </div>
      `;
      showUpdateDialog(html);
    }

    function downloadVcRedist() {
      openUrl('https://aka.ms/vs/17/release/vc_redist.x64.exe');
      showUpdateDialog(`
        <div class="update-icon">📋</div>
        <div class="update-title">请完成安装</div>
        <div class="update-desc">下载已开始，请运行安装程序完成 VC++ 运行库的安装，安装完成后点击下方按钮继续。</div>
        <div class="update-buttons" style="margin-top:16px;">
          <button class="update-btn-primary" onclick="onVcRedistInstalled()">安装完成</button>
        </div>
      `);
    }

    function onVcRedistInstalled() {
      vcRedistMandatory = false;
      hideUpdateDialog();
      if (pendingLlamacppResult && pendingLlamacppResult.llamacpp_needs_update) {
        setTimeout(function() {
          startLlamacppUpdate(pendingLlamacppResult);
          pendingLlamacppResult = null;
        }, 300);
      }
    }

    function onSystemUpdateDismiss() {
      hideUpdateDialog();
      if (pendingLlamacppResult) {
        const result = pendingLlamacppResult;
        pendingLlamacppResult = null;
        setTimeout(function() {
          if (!result.vc_redist_installed) {
            pendingLlamacppResult = result.llamacpp_needs_update ? result : null;
            showVcRedistInstallDialog();
          } else if (result.llamacpp_needs_update) {
            startLlamacppUpdate(result);
          }
        }, 300);
      }
    }

    async function startLlamacppUpdate(result) {
      const isNotInstalled = !result.llamacpp_local_version || result.llamacpp_local_version === "未安装";
      llamacppIsMandatory = isNotInstalled;

      const localVer = result.llamacpp_local_version || "未安装";
      const remoteVer = result.llamacpp_remote_version || "";
      const downloadUrl = result.llamacpp_download_url;

      // 检查下载地址是否有效
      if (!downloadUrl) {
        const html = `
          <div class="update-icon">⚠️</div>
          <div class="update-title">无法获取下载地址</div>
          <div class="update-desc">未检测到支持的 NVIDIA/AMD/Intel 显卡，无法下载对应版本的 llamacpp。<br>请确认显卡驱动已正确安装，或联系技术支持。</div>
          <div class="update-buttons" style="margin-top:16px;">
            <button class="update-btn-secondary" onclick="hideUpdateDialog()">关闭</button>
          </div>
        `;
        showUpdateDialog(html);
        return;
      }

      let buttonsHtml;
      if (isNotInstalled) {
        buttonsHtml = `
          <div class="update-buttons" style="margin-top:16px;">
            <button class="update-btn-primary" id="llamacpp-start-btn" onclick="doLlamacppDownload()">开始下载</button>
          </div>
        `;
      } else {
        buttonsHtml = `
          <div class="update-buttons" style="margin-top:16px;">
            <button class="update-btn-primary" id="llamacpp-start-btn" onclick="doLlamacppDownload()">开始下载</button>
            <button class="update-btn-secondary" onclick="hideUpdateDialog()">稍后再说</button>
          </div>
        `;
      }

      const html = `
        <div class="update-icon">🔧</div>
        <div class="update-title">${isNotInstalled ? "需要安装 LLamaCPP" : "LLamaCPP 需要更新"}</div>
        <div class="update-desc">${isNotInstalled ? "首次使用需要安装 LLamaCPP 运行库" : "检测到 LLamaCPP 运行库需要更新"}</div>
        <div class="update-info-row">
          <div class="info-item">
            <div class="info-label">当前版本</div>
            <div class="info-value">${localVer}</div>
          </div>
          <div class="info-item">
            <div class="info-label">最新版本</div>
            <div class="info-value">${remoteVer}</div>
          </div>
        </div>
        <div class="llamacpp-progress-bar">
          <div class="llamacpp-progress-fill" id="llamacpp-progress-fill" style="width: 0%"></div>
        </div>
        <div class="llamacpp-status-text" id="llamacpp-status-text">准备下载...</div>
        ${buttonsHtml}
      `;
      showUpdateDialog(html);

      // 存储下载链接供按钮和自动下载使用
      pendingLlamacppUrl = downloadUrl;

      // 如果是未安装状态，自动开始下载
      if (isNotInstalled) {
        setTimeout(function() {
          doLlamacppDownload();
        }, 500);
      }
    }

    let pendingLlamacppUrl = null;

    async function doLlamacppDownload() {
      var startBtn = document.getElementById("llamacpp-start-btn");
      if (startBtn) startBtn.style.display = "none";

      var statusText = document.getElementById("llamacpp-status-text");
      var progressFill = document.getElementById("llamacpp-progress-fill");

      if (!pendingLlamacppUrl) {
        if (statusText) statusText.textContent = "下载失败: 缺少下载地址";
        if (startBtn) {
          startBtn.style.display = "";
          startBtn.textContent = "重试";
        }
        return;
      }

      try {
        await invoke("download_and_extract_llamacpp", { url: pendingLlamacppUrl });
      } catch (e) {
        if (statusText) statusText.textContent = "下载失败: " + e;
        if (progressFill) progressFill.style.width = "0%";
        if (startBtn) {
          startBtn.style.display = "";
          startBtn.textContent = "重试";
        }
      }
    }

    function setupLlamacppProgressListener() {
      if (typeof listen !== "function") return;
      try {
        listen("llamacpp-download-progress", function (event) {
          var payload = event.payload;
          var statusText = document.getElementById("llamacpp-status-text");
          var progressFill = document.getElementById("llamacpp-progress-fill");

          if (payload.status === "downloading") {
            if (statusText) statusText.textContent = "正在下载... " + payload.progress + "%";
            if (progressFill) progressFill.style.width = payload.progress + "%";
          } else if (payload.status === "extracting") {
            if (statusText) statusText.textContent = "正在解压安装...";
            if (progressFill) progressFill.style.width = "95%";
          } else if (payload.status === "done") {
            if (statusText) statusText.textContent = "安装完成！";
            if (progressFill) progressFill.style.width = "100%";
            // 安装完成后，清除强制标志，允许关闭对话框
            llamacppIsMandatory = false;
            setTimeout(function () { hideUpdateDialog(); }, 1500);
          }
        });
      } catch (_) {}
    }

    // ===== admAgent 版本更新（接入主升级流程） =====

    let pendingAdmAgentUrl = null;
    let pendingAdmAgentOnComplete = null;

    async function startAdmAgentUpdate(result, onComplete) {
      pendingAdmAgentOnComplete = typeof onComplete === "function" ? onComplete : null;
      const isNotInstalled = !result.local_version || result.local_version === "未安装";
      const localVer = result.local_version || "未安装";
      const remoteVer = result.remote_version || "";
      const downloadUrl = result.download_url;

      if (!downloadUrl) {
        const html = `
          <div class="update-icon">⚠️</div>
          <div class="update-title">无法获取下载地址</div>
          <div class="update-desc">当前系统暂不支持 admAgent 自动更新，请前往官网手动下载。</div>
          <div class="update-buttons" style="margin-top:16px;">
            <button class="update-btn-secondary" onclick="dismissAdmAgentUpdate()">关闭</button>
          </div>
        `;
        showUpdateDialog(html);
        return;
      }

      let buttonsHtml;
      if (isNotInstalled) {
        buttonsHtml = `
          <div class="update-buttons" style="margin-top:16px;">
            <button class="update-btn-primary" id="admagent-start-btn" onclick="doAdmAgentDownload()">开始下载</button>
          </div>
        `;
      } else {
        buttonsHtml = `
          <div class="update-buttons" style="margin-top:16px;">
            <button class="update-btn-primary" id="admagent-start-btn" onclick="doAdmAgentDownload()">开始下载</button>
            <button class="update-btn-secondary" onclick="dismissAdmAgentUpdate()">稍后再说</button>
          </div>
        `;
      }

      const html = `
        <div class="update-icon">🤖</div>
        <div class="update-title">${isNotInstalled ? "需要安装 admAgent" : "admAgent 需要更新"}</div>
        <div class="update-desc">${isNotInstalled ? "首次使用需要安装 admAgent 工具" : "检测到 admAgent 工具需要更新"}</div>
        <div class="update-info-row">
          <div class="info-item">
            <div class="info-label">当前版本</div>
            <div class="info-value">${localVer}</div>
          </div>
          <div class="info-item">
            <div class="info-label">最新版本</div>
            <div class="info-value">${remoteVer}</div>
          </div>
        </div>
        <div class="llamacpp-progress-bar">
          <div class="llamacpp-progress-fill" id="admagent-progress-fill" style="width: 0%"></div>
        </div>
        <div class="llamacpp-status-text" id="admagent-status-text">准备下载...</div>
        ${buttonsHtml}
      `;
      showUpdateDialog(html);

      pendingAdmAgentUrl = downloadUrl;

      // 未安装时自动开始下载
      if (isNotInstalled) {
        setTimeout(function() { doAdmAgentDownload(); }, 500);
      }
    }

    function dismissAdmAgentUpdate() {
      hideUpdateDialog();
      const cb = pendingAdmAgentOnComplete;
      pendingAdmAgentOnComplete = null;
      if (cb) cb();
    }

    async function doAdmAgentDownload() {
      var startBtn = document.getElementById("admagent-start-btn");
      if (startBtn) startBtn.style.display = "none";

      var statusText = document.getElementById("admagent-status-text");
      var progressFill = document.getElementById("admagent-progress-fill");

      if (!pendingAdmAgentUrl) {
        if (statusText) statusText.textContent = "下载失败: 缺少下载地址";
        if (startBtn) { startBtn.style.display = ""; startBtn.textContent = "重试"; }
        return;
      }

      try {
        await invoke("download_adm_agent_update", { url: pendingAdmAgentUrl });
      } catch (e) {
        if (statusText) statusText.textContent = "下载失败: " + e;
        if (progressFill) progressFill.style.width = "0%";
        if (startBtn) { startBtn.style.display = ""; startBtn.textContent = "重试"; }
      }
    }

    function setupAdmAgentUpdateProgressListener() {
      if (typeof listen !== "function") return;
      try {
        listen("adm-agent-update-progress", function (event) {
          var payload = event.payload;
          var statusText = document.getElementById("admagent-status-text");
          var progressFill = document.getElementById("admagent-progress-fill");
          if (payload.status === "downloading") {
            if (statusText) statusText.textContent = "正在下载... " + payload.progress + "%";
            if (progressFill) progressFill.style.width = payload.progress + "%";
          } else if (payload.status === "done") {
            if (statusText) statusText.textContent = "安装完成！";
            if (progressFill) progressFill.style.width = "100%";
            const cb = pendingAdmAgentOnComplete;
            pendingAdmAgentOnComplete = null;
            setTimeout(function () {
              hideUpdateDialog();
              if (cb) cb();
            }, 1500);
          }
        });
      } catch (_) {}
    }

    async function init() {
      try {
        setupEventForwarding();
        setupLlamacppProgressListener();
        setupAdmAgentUpdateProgressListener();
        setupAgentDownloadListener();
        setupAgentTerminalEventForwarding();
        systemInfo = await invoke("get_system_info");

        try {
          hwinfo.cpu = await invoke("plugin:hwinfo|get_cpu_info");
          hwinfo.ram = await invoke("plugin:hwinfo|get_ram_info");
          hwinfo.gpu = await invoke("plugin:hwinfo|get_gpu_info");
          hwinfo.os = await invoke("plugin:hwinfo|get_os_info");

          if (hwinfo.ram && hwinfo.ram.sizeMb) {
            systemInfo.total_ram = hwinfo.ram.sizeMb * 1024 * 1024;
          }
          if (hwinfo.gpu && hwinfo.gpu.vramMb) {
            systemInfo.total_vram = hwinfo.gpu.vramMb * 1024 * 1024;
            systemInfo.has_gpu = true;
          }
          if (hwinfo.cpu && hwinfo.cpu.threads) {
            systemInfo.cpu_logical_cores = hwinfo.cpu.threads;
          }
        } catch (hwe) {
          console.warn("hwinfo 插件获取失败，使用原有数据:", hwe);
        }

        updateHardwareBar();
        // 默认首页为选中态
        setActiveNav("home-btn");
      } catch (e) {
        console.error("获取系统信息失败:", e);
        document.getElementById("ram-info").textContent = "加载失败";
      }
    }

    // 启动时延迟检查更新（静默模式，有新版本才弹窗）
    setTimeout(() => {
      checkForUpdate(true);
    }, 3000);

    init();
  </script>
</body>
</html>
