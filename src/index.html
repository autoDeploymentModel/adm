<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #view-root {
      flex: 1;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #1a1a2e;
    }

    #agent-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #1a1a2e;
      display: none;
    }
    #agent-frame.show { display: block; }
    #view-root.hidden { display: none; }

    #hardware-bar {
      display: flex;
      align-items: center;
      gap: 0;
      background: #0f3460;
      padding: 4px 16px;
      font-size: 12px;
      color: #a0a0c0;
      border-top: 1px solid #1a1a3e;
      flex-shrink: 0;
    }

    #home-btn,
    #settings-btn,
    #agent-btn {
      cursor: pointer;
      font-size: 13px;
      padding: 2px 10px;
      border-right: 1px solid #2a2a4e;
      margin-right: 10px;
      transition: color 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .btn-icon {
      font-size: 20px;
      line-height: 1;
    }

    .btn-text {
      font-size: 11px;
      font-weight: 500;
    }

    #home-btn:hover,
    #settings-btn:hover,
    #agent-btn:hover {
      color: #6c63ff;
    }

    #home-btn.active,
    #settings-btn.active,
    #agent-btn.active {
      background: rgba(108, 99, 255, 0.20);
      color: #ffffff;
      border-radius: 6px;
      border-right-color: transparent;
    }
    #home-btn.active .btn-icon,
    #settings-btn.active .btn-icon,
    #agent-btn.active .btn-icon {
      color: #6c63ff;
    }

    #hw-items {
      display: flex;
      align-items: center;
      margin-left: auto;
    }

    .hw-item {
      padding: 0 12px;
      border-right: 1px solid #2a2a4e;
    }

    .hw-item:last-child {
      border-right: none;
    }

    .hw-label {
      color: #c0c0e0;
      margin-right: 4px;
      white-space: nowrap;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
      vertical-align: bottom;
    }

    .hw-value {
      color: #f0f0ff;
      font-weight: 600;
    }

    /* 更新弹窗样式 */
    #update-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    #update-overlay.show {
      display: flex;
    }
    #update-dialog {
      background: #16213e;
      border: 1px solid #2a2a4e;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #update-dialog .update-icon { font-size: 40px; text-align: center; margin-bottom: 12px; }
    #update-dialog .update-title { font-size: 20px; font-weight: 600; color: #ffffff; text-align: center; margin-bottom: 8px; }
    #update-dialog .update-desc { font-size: 14px; color: #a0a0c0; text-align: center; margin-bottom: 20px; line-height: 1.6; }
    #update-dialog .update-info-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 20px; font-size: 13px; }
    #update-dialog .update-info-row .info-item { text-align: center; }
    #update-dialog .update-info-row .info-label { color: #8080a0; font-size: 11px; }
    #update-dialog .update-info-row .info-value { color: #e0e0e0; font-weight: 500; margin-top: 2px; }
    #update-dialog .update-buttons { display: flex; gap: 12px; justify-content: center; }
    #update-dialog .update-btn-primary { background: #6c63ff; color: #fff; border: none; padding: 10px 28px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    #update-dialog .update-btn-primary:hover { background: #5a52d5; }
    #update-dialog .update-btn-secondary { background: rgba(255, 255, 255, 0.1); color: #e0e0e0; border: none; padding: 10px 28px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
    #update-dialog .update-btn-secondary:hover { background: rgba(255, 255, 255, 0.2); }
    #update-dialog .checking-text { text-align: center; color: #8080a0; font-size: 14px; padding: 20px 0; }
    #update-dialog .checking-text .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #2a2a4e; border-top-color: #6c63ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .llamacpp-progress-bar { width: 100%; height: 6px; background: #2a2a4e; border-radius: 3px; margin-top: 12px; overflow: hidden; }
    .llamacpp-progress-fill { height: 100%; background: #6c63ff; border-radius: 3px; transition: width 0.3s ease; }
    .llamacpp-status-text { font-size: 12px; color: #8080a0; margin-top: 6px; text-align: center; }

    /* Agent 下载弹窗 */
    #agent-download-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 9998;
      justify-content: center;
      align-items: center;
    }
    #agent-download-overlay.show { display: flex; }
    .agent-download-dialog { background: #16213e; border: 1px solid #2a2a4e; border-radius: 12px; padding: 28px 32px; max-width: 460px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center; }
    .agent-download-dialog .ad-icon { font-size: 40px; margin-bottom: 12px; }
    .agent-download-dialog .ad-title { font-size: 20px; font-weight: 600; color: #ffffff; margin-bottom: 8px; }
    .agent-download-dialog .ad-desc { font-size: 14px; color: #a0a0c0; margin-bottom: 20px; line-height: 1.6; }

    .global-toast {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20,20,40,0.96);
      color: #e0e0e0;
      padding: 18px 28px;
      border-radius: 10px;
      font-size: 15px;
      z-index: 9999;
      border: 1px solid #4a4a7e;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      cursor: default;
    }

    /* ===== 全局启动日志面板 ===== */
    #launch-log-btn {
      cursor: pointer;
      font-size: 13px;
      padding: 2px 10px;
      margin-left: 10px;
      transition: color 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      position: relative;
    }
    #launch-log-btn .btn-icon { font-size: 20px; line-height: 1; }
    #launch-log-btn .btn-text { font-size: 11px; font-weight: 500; }
    #launch-log-btn:hover { color: #6c63ff; }
#launch-log-panel {
      display: none;
      position: fixed;
      right: 0;
      bottom: 44px;
      width: 720px;
      max-width: 100vw;
      height: 420px;
      background: #0d1117;
      border: 1px solid #2a2a4e;
      border-bottom: none;
      border-radius: 8px 0 0 0;
      z-index: 9990;
      flex-direction: column;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
    }
    #launch-log-panel.show { display: flex; }

    .llp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: #161b22;
      border-bottom: 1px solid #2a2a4e;
      border-radius: 8px 0 0 0;
      flex-shrink: 0;
    }
    .llp-title {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .llp-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    .llp-status-dot.running { background: #43a047; }
    .llp-status-dot.stopped { background: #e53935; }
    .llp-controls { display: flex; gap: 6px; }
    .llp-btn {
      padding: 3px 10px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .llp-btn-clear { background: #e53935; color: #fff; }
    .llp-btn-clear:hover { background: #c62828; }
    .llp-btn-export { background: #43a047; color: #fff; }
    .llp-btn-export:hover { background: #2e7d32; }
    .llp-btn-close { background: #333; color: #ccc; }
    .llp-btn-close:hover { background: #444; }

    .llp-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
      font-size: 12px;
      line-height: 1.6;
    }
    .llp-content::-webkit-scrollbar { width: 6px; }
    .llp-content::-webkit-scrollbar-track { background: #0d1117; }
    .llp-content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .llp-line { white-space: pre-wrap; word-break: break-all; padding: 1px 0; }
    .llp-line.info { color: #c9d1d9; }
    .llp-line.stderr { color: #f97583; }
    .llp-line.error { color: #f85149; font-weight: 600; }
    .llp-line.warning { color: #d29922; }
    .llp-line.success { color: #56d364; }
    .llp-line.debug { color: #58a6ff; }
    .llp-line.timestamp { color: #6e7681; }
  </style>
</head>
<body>
  <!-- 更新弹窗 -->
  <div id="update-overlay">
    <div id="update-dialog">
      <div id="update-content"></div>
    </div>
  </div>

  <!-- Agent 下载弹窗 -->
  <div id="agent-download-overlay">
    <div class="agent-download-dialog">
      <div class="ad-icon">🤖</div>
      <div class="ad-title">正在下载 Agent 工具</div>
      <div class="ad-desc">首次使用需要下载 admAgent 工具，下载完成后将自动进入 Agent 终端。</div>
      <div class="llamacpp-progress-bar">
        <div class="llamacpp-progress-fill" id="agent-progress-fill" style="width: 0%"></div>
      </div>
      <div class="llamacpp-status-text" id="agent-status-text">准备下载...</div>
    </div>
  </div>

  <div id="app">
    <div id="view-root"></div>
    <iframe id="agent-frame"></iframe>
    <div id="hardware-bar">
      <div id="home-btn" onclick="location.hash='#/list'">
        <span class="btn-icon">&#8962;</span>
        <span class="btn-text">首页</span>
      </div>
      <div id="settings-btn" onclick="location.hash='#/settings'">
        <span class="btn-icon">&#9881;</span>
        <span class="btn-text">设置</span>
      </div>
      <div id="agent-btn" onclick="goAgent()">
        <span class="btn-icon">&#129302;</span>
        <span class="btn-text">Agent</span>
      </div>
      <div id="hw-items">
        <div class="hw-item">
          <span class="hw-label">内存</span>
          <span class="hw-value" id="ram-info">--</span>
        </div>
        <div class="hw-item">
          <span class="hw-label" id="gpu-label">显存</span>
          <span class="hw-value" id="vram-info">--</span>
        </div>
        <div class="hw-item">
          <span class="hw-label">CPU</span>
          <span class="hw-value" id="cpu-info">--</span>
        </div>
      </div>
      <div id="launch-log-btn" onclick="toggleLaunchLogPanel()">
        <span class="btn-icon">📋</span>
        <span class="btn-text">启动日志</span>
        
      </div>
    </div>

    <div id="launch-log-panel">
      <div class="llp-header">
        <div class="llp-title">
          <span class="llp-status-dot" id="llp-status-dot"></span>
          <span>启动日志</span>
          <span id="llp-model-name" style="color:#8b949e;font-weight:400;font-size:12px;"></span>
        </div>
        <div class="llp-controls">
          <button class="llp-btn llp-btn-export" onclick="exportLaunchLogs()">导出</button>
          <button class="llp-btn llp-btn-clear" onclick="clearLaunchLogs()">清除</button>
          <button class="llp-btn llp-btn-close" onclick="toggleLaunchLogPanel()">关闭</button>
        </div>
      </div>
      <div class="llp-content" id="llp-content"></div>
    </div>
  </div>

  <script type="module">
    // ===== 全局基础设施 =====
    const invoke = window.__TAURI__?.core?.invoke || window.__TAURI_INTERNALS__?.invoke;
    const listen = window.__TAURI__?.event?.listen || window.__TAURI_INTERNALS__?.listen;
    window.__adm_invoke = invoke;
    window.__adm_listen = listen;

    // 共享状态（提升原 model_list 局部变量，跨视图共享）
    window.__adm_state = {
      systemInfo: null,
      runningModelId: null,
      runningModelPort: null,
      localModels: [],
      partFiles: {},
      downloadingModels: {},
      downloadingMmproj: {},
      downloadingDiffusion: {},
      downloadingVae: {},
      modelList: [],
      modelTypes: [],
      currentTypeFilter: "all",
      logPanelVisible: false,
      currentLogModelId: null,
    };

    let systemInfo = null;
    let hwinfo = { cpu: null, ram: null, gpu: null, os: null };
    let llamacppIsMandatory = false;

    function formatBytes(bytes) {
      if (bytes === 0) return "0 B";
      const k = 1024;
      const sizes = ["B", "KB", "MB", "GB", "TB"];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + sizes[i];
    }

    // ===== 全局启动日志 =====
    const launchLogs = [];
    let launchLogPanelVisible = false;
    let launchLogUnreadCount = 0;
    let launchLogCurrentModel = null;

    function addLaunchLog(line, type) {
      type = type || 'info';
      const ts = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      const entry = { ts: ts, line: line, type: type };
      launchLogs.push(entry);
      if (launchLogs.length > 2000) launchLogs.shift();


      var content = document.getElementById('llp-content');
      if (content) {
        var div = document.createElement('div');
        div.className = 'llp-line ' + type;
        div.textContent = '[' + ts + '] ' + line;
        content.appendChild(div);
        content.scrollTop = content.scrollHeight;
      }
    }

    function toggleLaunchLogPanel() {
      launchLogPanelVisible = !launchLogPanelVisible;
      var panel = document.getElementById('launch-log-panel');
      if (panel) panel.classList.toggle('show', launchLogPanelVisible);
if (launchLogPanelVisible) {
var content = document.getElementById('llp-content');
        if (content) content.scrollTop = content.scrollHeight;
      }
    }

    function clearLaunchLogs() {
      launchLogs.length = 0;
      var content = document.getElementById('llp-content');
      if (content) content.innerHTML = '';
    }

    function exportLaunchLogs() {
      if (launchLogs.length === 0) return;
      var text = launchLogs.map(function(e) { return '[' + e.ts + '] [' + e.type + '] ' + e.line; }).join('\\n');
      var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'launch-log-' + Date.now() + '.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    function setLaunchLogStatus(running, modelName) {
      var dot = document.getElementById('llp-status-dot');
      var nameEl = document.getElementById('llp-model-name');
      if (dot) {
        dot.classList.remove('running', 'stopped');
        if (running) dot.classList.add('running');
        else dot.classList.add('stopped');
      }
      if (nameEl) nameEl.textContent = modelName ? '- ' + modelName : '';
    }

    function setupGlobalLaunchLogListener() {
      if (typeof listen !== "function") return;
      try {
        listen("model-log", function(event) {
          var payload = event.payload || {};
          var line = payload.line;
          var source = payload.source || 'stdout';
          if (!line) return;
          var type = 'info';
          if (source === 'stderr') type = 'stderr';
          else if (/error|Error|ERROR|fatal|FATAL/.test(line)) type = 'error';
          else if (/warning|Warning|WARN/.test(line)) type = 'warning';
          else if (/success|Success|listening|started|ready/.test(line)) type = 'success';
          else if (/^\[DEBUG\]|^\[WARN\]/.test(line)) type = 'debug';
          addLaunchLog(line, type);
        });
        listen("model-started", function(event) {
          var payload = event.payload || {};
          launchLogCurrentModel = payload.model_id || launchLogCurrentModel;
          setLaunchLogStatus(true, launchLogCurrentModel);
          addLaunchLog('✅ 模型启动成功! 端口: ' + (payload.port || ''), 'success');
        });
        listen("model-stopped", function(event) {
          setLaunchLogStatus(false, null);
          addLaunchLog('⏹️ 模型已停止', 'info');
        });
      } catch(e) { console.error('启动日志监听失败:', e); }
    }

    window.toggleLaunchLogPanel = toggleLaunchLogPanel;
    window.clearLaunchLogs = clearLaunchLogs;
    window.exportLaunchLogs = exportLaunchLogs;

    // ===== 导航激活态 =====
    function setActiveNav(id) {
      ["home-btn", "settings-btn", "agent-btn"].forEach(function (b) {
        const el = document.getElementById(b);
        if (el) el.classList.toggle("active", b === id);
      });
    }

    // ===== 更新弹窗 =====
    function showUpdateDialog(html) {
      document.getElementById("update-content").innerHTML = html;
      document.getElementById("update-overlay").classList.add("show");
    }

    function hideUpdateDialog() {
      if (llamacppIsMandatory || vcRedistMandatory) return;
      document.getElementById("update-overlay").classList.remove("show");
    }

    function openUrl(url) {
      if (window.__TAURI__?.core) {
        window.__TAURI__.core.invoke("plugin:opener|open_url", { url: url });
      } else if (window.__TAURI_INTERNALS__?.invoke) {
        window.__TAURI_INTERNALS__.invoke("plugin:opener|open_url", { url: url });
      } else {
        window.open(url, "_blank");
      }
    }

    let pendingLlamacppResult = null;
    let vcRedistMandatory = false;

    async function checkForUpdate(silent) {
      silent = silent || false;
      try {
        if (!silent) {
          showUpdateDialog('<div class="checking-text"><span class="spinner"></span>正在检查更新...</div>');
        }
        const result = await invoke("check_update");

        if (result.has_update) {
          pendingLlamacppResult = result;
          const html = `
            <div class="update-icon">📥</div>
            <div class="update-title">发现新版本</div>
            <div class="update-desc">有新版本可用，是否前往下载？</div>
            <div class="update-info-row">
              <div class="info-item"><div class="info-label">当前版本</div><div class="info-value">v${result.current_version}</div></div>
              <div class="info-item"><div class="info-label">最新版本</div><div class="info-value">v${result.remote_version}</div></div>
            </div>
            <div class="update-buttons">
              <button class="update-btn-primary" onclick="openUrl('${result.download_url}')">下载更新</button>
              <button class="update-btn-secondary" onclick="onSystemUpdateDismiss()">稍后再说</button>
            </div>`;
          showUpdateDialog(html);
          return;
        }

        if (!result.vc_redist_installed) {
          pendingLlamacppResult = result.llamacpp_needs_update ? result : null;
          showVcRedistInstallDialog();
          return;
        }

        if (result.llamacpp_needs_update) {
          startLlamacppUpdate(result);
          return;
        }

        if (!silent) {
          showUpdateDialog(`
            <div class="update-icon">✅</div>
            <div class="update-title">已是最新版本</div>
            <div class="update-desc">当前版本 v${result.current_version} 已是最新</div>
            <div class="update-buttons" style="margin-top:16px;">
              <button class="update-btn-secondary" onclick="hideUpdateDialog()">确定</button>
            </div>`);
        }
      } catch (e) {
        if (!silent) {
          showUpdateDialog(`
            <div class="update-icon">❌</div>
            <div class="update-title">检查更新失败</div>
            <div class="update-desc">${e}</div>
            <div class="update-buttons" style="margin-top:16px;">
              <button class="update-btn-secondary" onclick="hideUpdateDialog()">确定</button>
            </div>`);
        }
      }
    }

    function showVcRedistInstallDialog() {
      vcRedistMandatory = true;
      const html = `
        <div class="update-icon">📦</div>
        <div class="update-title">需要安装 VC++ 运行库</div>
        <div class="update-desc">检测到系统未安装 Visual C++ 2015-2022 运行库，这是运行 llama-server 的必要组件。</div>
        <div class="update-buttons" style="margin-top:16px;">
          <button class="update-btn-primary" onclick="downloadVcRedist()">下载安装</button>
        </div>`;
      showUpdateDialog(html);
    }

    function downloadVcRedist() {
      openUrl('https://aka.ms/vs/17/release/vc_redist.x64.exe');
      showUpdateDialog(`
        <div class="update-icon">📋</div>
        <div class="update-title">请完成安装</div>
        <div class="update-desc">下载已开始，请运行安装程序完成 VC++ 运行库的安装，安装完成后点击下方按钮继续。</div>
        <div class="update-buttons" style="margin-top:16px;">
          <button class="update-btn-primary" onclick="onVcRedistInstalled()">安装完成</button>
        </div>`);
    }

    function onVcRedistInstalled() {
      vcRedistMandatory = false;
      hideUpdateDialog();
      if (pendingLlamacppResult && pendingLlamacppResult.llamacpp_needs_update) {
        setTimeout(function() { startLlamacppUpdate(pendingLlamacppResult); pendingLlamacppResult = null; }, 300);
      }
    }

    function onSystemUpdateDismiss() {
      hideUpdateDialog();
      if (pendingLlamacppResult) {
        const result = pendingLlamacppResult;
        pendingLlamacppResult = null;
        setTimeout(function() {
          if (!result.vc_redist_installed) {
            pendingLlamacppResult = result.llamacpp_needs_update ? result : null;
            showVcRedistInstallDialog();
          } else if (result.llamacpp_needs_update) {
            startLlamacppUpdate(result);
          }
        }, 300);
      }
    }

    async function startLlamacppUpdate(result) {
      const isNotInstalled = !result.llamacpp_local_version || result.llamacpp_local_version === "未安装";
      llamacppIsMandatory = isNotInstalled;

      const localVer = result.llamacpp_local_version || "未安装";
      const remoteVer = result.llamacpp_remote_version || "";
      const downloadUrl = result.llamacpp_download_url;

      if (!downloadUrl) {
        showUpdateDialog(`
          <div class="update-icon">⚠️</div>
          <div class="update-title">无法获取下载地址</div>
          <div class="update-desc">未检测到支持的 NVIDIA/AMD/Intel 显卡，无法下载对应版本的 llamacpp。</div>
          <div class="update-buttons" style="margin-top:16px;"><button class="update-btn-secondary" onclick="hideUpdateDialog()">关闭</button></div>`);
        return;
      }

      let buttonsHtml;
      if (isNotInstalled) {
        buttonsHtml = `<div class="update-buttons" style="margin-top:16px;"><button class="update-btn-primary" id="llamacpp-start-btn" onclick="doLlamacppDownload()">开始下载</button></div>`;
      } else {
        buttonsHtml = `<div class="update-buttons" style="margin-top:16px;"><button class="update-btn-primary" id="llamacpp-start-btn" onclick="doLlamacppDownload()">开始下载</button><button class="update-btn-secondary" onclick="hideUpdateDialog()">稍后再说</button></div>`;
      }

      const html = `
        <div class="update-icon">🔧</div>
        <div class="update-title">${isNotInstalled ? "需要安装 LLamaCPP" : "LLamaCPP 需要更新"}</div>
        <div class="update-desc">${isNotInstalled ? "首次使用需要安装 LLamaCPP 运行库" : "检测到 LLamaCPP 运行库需要更新"}</div>
        <div class="update-info-row">
          <div class="info-item"><div class="info-label">当前版本</div><div class="info-value">${localVer}</div></div>
          <div class="info-item"><div class="info-label">最新版本</div><div class="info-value">${remoteVer}</div></div>
        </div>
        <div class="llamacpp-progress-bar"><div class="llamacpp-progress-fill" id="llamacpp-progress-fill" style="width: 0%"></div></div>
        <div class="llamacpp-status-text" id="llamacpp-status-text">准备下载...</div>
        ${buttonsHtml}`;
      showUpdateDialog(html);

      pendingLlamacppUrl = downloadUrl;
      if (isNotInstalled) setTimeout(function() { doLlamacppDownload(); }, 500);
    }

    let pendingLlamacppUrl = null;

    async function doLlamacppDownload() {
      var startBtn = document.getElementById("llamacpp-start-btn");
      if (startBtn) startBtn.style.display = "none";
      var statusText = document.getElementById("llamacpp-status-text");
      var progressFill = document.getElementById("llamacpp-progress-fill");
      if (!pendingLlamacppUrl) {
        if (statusText) statusText.textContent = "下载失败: 缺少下载地址";
        if (startBtn) { startBtn.style.display = ""; startBtn.textContent = "重试"; }
        return;
      }
      try {
        await invoke("download_and_extract_llamacpp", { url: pendingLlamacppUrl });
      } catch (e) {
        if (statusText) statusText.textContent = "下载失败: " + e;
        if (progressFill) progressFill.style.width = "0%";
        if (startBtn) { startBtn.style.display = ""; startBtn.textContent = "重试"; }
      }
    }

    function setupLlamacppProgressListener() {
      if (typeof listen !== "function") return;
      try {
        listen("llamacpp-download-progress", function (event) {
          var payload = event.payload;
          var statusText = document.getElementById("llamacpp-status-text");
          var progressFill = document.getElementById("llamacpp-progress-fill");
          if (payload.status === "downloading") {
            if (statusText) statusText.textContent = "正在下载... " + payload.progress + "%";
            if (progressFill) progressFill.style.width = payload.progress + "%";
          } else if (payload.status === "extracting") {
            if (statusText) statusText.textContent = "正在解压安装...";
            if (progressFill) progressFill.style.width = "95%";
          } else if (payload.status === "done") {
            if (statusText) statusText.textContent = "安装完成！";
            if (progressFill) progressFill.style.width = "100%";
            llamacppIsMandatory = false;
            setTimeout(function () { hideUpdateDialog(); }, 1500);
          }
        });
      } catch (_) {}
    }

    // ===== admAgent 版本更新 =====
    let pendingAdmAgentUrl = null;
    let pendingAdmAgentOnComplete = null;

    async function startAdmAgentUpdate(result, onComplete) {
      pendingAdmAgentOnComplete = typeof onComplete === "function" ? onComplete : null;
      const isNotInstalled = !result.local_version || result.local_version === "未安装";
      const localVer = result.local_version || "未安装";
      const remoteVer = result.remote_version || "";
      const downloadUrl = result.download_url;

      if (!downloadUrl) {
        showUpdateDialog(`
          <div class="update-icon">⚠️</div>
          <div class="update-title">无法获取下载地址</div>
          <div class="update-desc">当前系统暂不支持 admAgent 自动更新，请前往官网手动下载。</div>
          <div class="update-buttons" style="margin-top:16px;"><button class="update-btn-secondary" onclick="dismissAdmAgentUpdate()">关闭</button></div>`);
        return;
      }

      let buttonsHtml;
      if (isNotInstalled) {
        buttonsHtml = `<div class="update-buttons" style="margin-top:16px;"><button class="update-btn-primary" id="admagent-start-btn" onclick="doAdmAgentDownload()">开始下载</button></div>`;
      } else {
        buttonsHtml = `<div class="update-buttons" style="margin-top:16px;"><button class="update-btn-primary" id="admagent-start-btn" onclick="doAdmAgentDownload()">开始下载</button><button class="update-btn-secondary" onclick="dismissAdmAgentUpdate()">稍后再说</button></div>`;
      }

      const html = `
        <div class="update-icon">🤖</div>
        <div class="update-title">${isNotInstalled ? "需要安装 admAgent" : "admAgent 需要更新"}</div>
        <div class="update-desc">${isNotInstalled ? "首次使用需要安装 admAgent 工具" : "检测到 admAgent 工具需要更新"}</div>
        <div class="update-info-row">
          <div class="info-item"><div class="info-label">当前版本</div><div class="info-value">${localVer}</div></div>
          <div class="info-item"><div class="info-label">最新版本</div><div class="info-value">${remoteVer}</div></div>
        </div>
        <div class="llamacpp-progress-bar"><div class="llamacpp-progress-fill" id="admagent-progress-fill" style="width: 0%"></div></div>
        <div class="llamacpp-status-text" id="admagent-status-text">准备下载...</div>
        ${buttonsHtml}`;
      showUpdateDialog(html);
      pendingAdmAgentUrl = downloadUrl;
      if (isNotInstalled) setTimeout(function() { doAdmAgentDownload(); }, 500);
    }

    function dismissAdmAgentUpdate() {
      hideUpdateDialog();
      const cb = pendingAdmAgentOnComplete;
      pendingAdmAgentOnComplete = null;
      if (cb) cb();
    }

    async function doAdmAgentDownload() {
      var startBtn = document.getElementById("admagent-start-btn");
      if (startBtn) startBtn.style.display = "none";
      var statusText = document.getElementById("admagent-status-text");
      var progressFill = document.getElementById("admagent-progress-fill");
      if (!pendingAdmAgentUrl) {
        if (statusText) statusText.textContent = "下载失败: 缺少下载地址";
        if (startBtn) { startBtn.style.display = ""; startBtn.textContent = "重试"; }
        return;
      }
      try {
        await invoke("download_adm_agent_update", { url: pendingAdmAgentUrl });
      } catch (e) {
        if (statusText) statusText.textContent = "下载失败: " + e;
        if (progressFill) progressFill.style.width = "0%";
        if (startBtn) { startBtn.style.display = ""; startBtn.textContent = "重试"; }
      }
    }

    function setupAdmAgentUpdateProgressListener() {
      if (typeof listen !== "function") return;
      try {
        listen("adm-agent-update-progress", function (event) {
          var payload = event.payload;
          var statusText = document.getElementById("admagent-status-text");
          var progressFill = document.getElementById("admagent-progress-fill");
          if (payload.status === "downloading") {
            if (statusText) statusText.textContent = "正在下载... " + payload.progress + "%";
            if (progressFill) progressFill.style.width = payload.progress + "%";
          } else if (payload.status === "done") {
            if (statusText) statusText.textContent = "安装完成！";
            if (progressFill) progressFill.style.width = "100%";
            const cb = pendingAdmAgentOnComplete;
            pendingAdmAgentOnComplete = null;
            setTimeout(function () { hideUpdateDialog(); if (cb) cb(); }, 1500);
          }
        });
      } catch (_) {}
    }

    // ===== Agent 终端（方案 A：保留 iframe）=====
    let agentFrameLoaded = false;

    function showAgentFrame() {
      const cf = document.getElementById("view-root");
      const af = document.getElementById("agent-frame");
      if (cf) cf.classList.add("hidden");
      if (af) {
        af.classList.add("show");
        setActiveNav("agent-btn");
        try { af.focus(); } catch (_) {}
        if (!agentFrameLoaded) {
          af.src = "agent.html";
          agentFrameLoaded = true;
          af.onload = function () {
            af.onload = null;
            setTimeout(function () {
              if (af && af.contentWindow) af.contentWindow.postMessage({ type: "agent-resize" }, "*");
            }, 60);
          };
          return;
        }
      }
      setTimeout(function () {
        if (af && af.contentWindow) af.contentWindow.postMessage({ type: "agent-resize" }, "*");
      }, 60);
    }

    function hideAgentFrame() {
      const cf = document.getElementById("view-root");
      const af = document.getElementById("agent-frame");
      if (cf) cf.classList.remove("hidden");
      if (af) af.classList.remove("show");
    }

    async function goAgent() {
      try {
        const osName = String(await invoke("get_platform_os")).toLowerCase();
        // 仅支持 Windows 和 macOS (arm64 / aarch64)
        const supported = osName === "windows" || osName === "macos";
        if (!supported) {
          showComingSoon();
          return;
        }
        // macOS 仅支持 ARM 架构（M 系列）
        if (osName === "macos") {
          const arch = String(await invoke("get_platform_arch")).toLowerCase();
          if (arch !== "aarch64" && arch !== "arm64") {
            showComingSoon("当前仅支持 Apple Silicon (M 系列) Mac");
            return;
          }
        }
        try { await invoke("prepare_adm_agent_config"); } catch (_) {}
        const running = await invoke("is_model_running");
        if (!running) { showComingSoon("请先启动模型"); return; }
        const info = await invoke("check_adm_agent");
        if (!info.exists) {
          showAgentDownloadDialog();
          await invoke("download_adm_agent");
          setTimeout(function () { hideAgentDownloadDialog(); location.hash = "#/agent"; }, 700);
          return;
        }
        const upd = await invoke("check_adm_agent_update");
        if (upd.needs_update && upd.download_url) {
          startAdmAgentUpdate(upd, function () { location.hash = "#/agent"; });
          return;
        }
        
        // 所有平台统一导航到 #/agent，WT 的启动由 agent.html 负责
        location.hash = "#/agent";
      } catch (e) {
        hideAgentDownloadDialog();
        showComingSoon("操作失败: " + e);
      }
    }

    function showComingSoon(msg) {
      let tip = document.getElementById("os-tip");
      if (!tip) {
        tip = document.createElement("div");
        tip.id = "os-tip";
        tip.className = "global-toast";
        document.body.appendChild(tip);
      }
      tip.textContent = msg || "该功能即将开放，敬请期待";
      tip.style.display = "block";
      clearTimeout(showComingSoon._t);
      showComingSoon._t = setTimeout(function () { tip.style.display = "none"; }, 2500);
    }

    function showAgentDownloadDialog() {
      const fill = document.getElementById("agent-progress-fill");
      const text = document.getElementById("agent-status-text");
      if (fill) fill.style.width = "0%";
      if (text) { text.textContent = "准备下载..."; text.style.color = "#8080a0"; }
      document.getElementById("agent-download-overlay").classList.add("show");
    }

    function hideAgentDownloadDialog() {
      document.getElementById("agent-download-overlay").classList.remove("show");
    }

    function updateAgentDownloadStatus(msg, isError) {
      const text = document.getElementById("agent-status-text");
      if (text) { text.textContent = msg; if (isError) text.style.color = "#ff6b6b"; }
    }

    function setupAgentDownloadListener() {
      if (typeof listen !== "function") return;
      try {
        listen("agent-download-progress", function (event) {
          const payload = event.payload || {};
          const fill = document.getElementById("agent-progress-fill");
          const text = document.getElementById("agent-status-text");
          if (payload.status === "downloading") {
            if (text) text.textContent = "正在下载... " + payload.progress + "%";
            if (fill) fill.style.width = payload.progress + "%";
          } else if (payload.status === "done") {
            if (text) text.textContent = "下载完成！";
            if (fill) fill.style.width = "100%";
          }
        });
      } catch (_) {}
    }

    function setupAgentTerminalEventForwarding() {
      if (typeof listen !== "function") return;
      const forward = (name) => {
        try {
          listen(name, function (event) {
            const frame = document.getElementById("agent-frame");
            if (frame && frame.contentWindow) frame.contentWindow.postMessage({ type: name, payload: event.payload }, "*");
          });
        } catch (_) {}
      };
      ["agent-terminal-data", "agent-terminal-exit", "agent-terminal-ready"].forEach(forward);
    }

    // 暴露给视图模块（如 settings 调用）
    window.ADM = {
      showUpdateDialog,
      hideUpdateDialog,
      checkForUpdate,
    };
    window.goAgent = goAgent;
    window.openUrl = openUrl;
    window.onSystemUpdateDismiss = onSystemUpdateDismiss;
    window.downloadVcRedist = downloadVcRedist;
    window.onVcRedistInstalled = onVcRedistInstalled;
    window.doLlamacppDownload = doLlamacppDownload;
    window.dismissAdmAgentUpdate = dismissAdmAgentUpdate;
    window.doAdmAgentDownload = doAdmAgentDownload;

    // ===== 硬件栏 =====
    function updateHardwareBar() {
      if (!systemInfo) return;
      try {
        document.getElementById("ram-info").textContent = formatBytes(systemInfo.total_ram);
        if (systemInfo.has_gpu && systemInfo.total_vram > 0) {
          document.getElementById("vram-info").textContent = formatBytes(systemInfo.total_vram);
          if (hwinfo.gpu && hwinfo.gpu.model) document.getElementById("gpu-label").textContent = hwinfo.gpu.model;
        } else {
          document.getElementById("vram-info").textContent = "无显卡";
        }
        const cpuCores = systemInfo.cpu_physical_cores;
        const cpuThreads = systemInfo.cpu_logical_cores;
        if (hwinfo.cpu && hwinfo.cpu.model) {
          document.getElementById("cpu-info").textContent = hwinfo.cpu.model + " " + cpuCores + "C/" + cpuThreads + "T";
        } else {
          document.getElementById("cpu-info").textContent = cpuCores + "C/" + cpuThreads + "T";
        }
      } catch (e) {
        console.error("更新硬件栏失败:", e);
        document.getElementById("ram-info").textContent = "加载失败";
      }
    }

    // ===== 路由器 =====
    const routes = {
      "/list":     { load: () => import("./views/model_list.js"),     nav: "home-btn" },
      "/chat":     { load: () => import("./views/model_chat.js"),     nav: "home-btn" },
      "/image":    { load: () => import("./views/model_image.js"),    nav: "home-btn" },
      "/settings": { load: () => import("./views/settings.js"),       nav: "settings-btn" },
    };

    let currentView = null;

    async function renderRoute() {
      const hash = location.hash || "#/list";
      const clean = hash.replace(/^#/, "");
      const qIndex = clean.indexOf("?");
      const path = qIndex >= 0 ? clean.substring(0, qIndex) : clean;
      const queryStr = qIndex >= 0 ? clean.substring(qIndex + 1) : "";
      const params = {};
      if (queryStr) {
        queryStr.split("&").forEach((pair) => {
          const idx = pair.indexOf("=");
          const k = decodeURIComponent(pair.substring(0, idx >= 0 ? idx : pair.length));
          const v = idx >= 0 ? decodeURIComponent(pair.substring(idx + 1)) : "";
          params[k] = v;
        });
      }

      // Agent 路由（方案 A）：不加载视图模块，显隐 iframe
      if (path === "/agent") {
        if (currentView) { currentView.unmount && currentView.unmount(); currentView = null; }
        showAgentFrame();
        return;
      }

      // 非 agent 路由：确保 view-root 可见、agent 隐藏
      hideAgentFrame();

      const route = routes[path] || routes["/list"];
      setActiveNav(route.nav);

      const root = document.getElementById("view-root");
      if (currentView && currentView.unmount) currentView.unmount();
      currentView = null;
      root.innerHTML = "";

      try {
        const mod = await route.load();
        const view = mod.default;
        currentView = view;
        view.mount(root, params);
      } catch (e) {
        console.error("加载视图失败:", e);
        root.innerHTML = '<div style="padding:40px;color:#ff6b6b;">页面加载失败: ' + e + '</div>';
      }
    }

    window.addEventListener("hashchange", renderRoute);

    // 接收 Agent 独立 iframe (agent.html) 的消息（方案 A 保留 iframe）
    window.addEventListener("message", function (event) {
      const data = event.data;
      if (!data || !data.type) return;
      // agent 内"返回"按钮：原 postMessage({type:"navigate", page:"model_list.html"})
      if (data.type === "navigate") {
        location.hash = "#/list";
      }
      // agent 终端请求父窗口把键盘焦点交给 iframe
      if (data.type === "agent-focus-me") {
        const f = document.getElementById("agent-frame");
        if (f) { try { f.focus(); } catch (_) {} try { if (f.contentWindow) f.contentWindow.focus(); } catch (_) {} }
      }
      // agent 内剪贴板受限时由父窗口代理读取
      if (data.type === "agent-read-clipboard") {
        const id = data.id;
        const frame = document.getElementById("agent-frame");
        const send = function (text, error) {
          if (frame && frame.contentWindow) frame.contentWindow.postMessage({ type: "agent-clipboard-result", id: id, text: text, error: error }, "*");
        };
        if (navigator.clipboard && navigator.clipboard.readText) {
          navigator.clipboard.readText().then(function (t) { send(t, null); }).catch(function (err) { send(null, String(err)); });
        } else {
          send(null, "剪贴板不可用");
        }
      }
    });

    // ===== 初始化 =====
    async function init() {
      try {
        setupLlamacppProgressListener();
        setupAdmAgentUpdateProgressListener();
        setupAgentDownloadListener();
        setupAgentTerminalEventForwarding();
        setupGlobalLaunchLogListener();

        systemInfo = await invoke("get_system_info");
        window.__adm_state.systemInfo = systemInfo;

        try {
          hwinfo.cpu = await invoke("plugin:hwinfo|get_cpu_info");
          hwinfo.ram = await invoke("plugin:hwinfo|get_ram_info");
          hwinfo.gpu = await invoke("plugin:hwinfo|get_gpu_info");
          hwinfo.os = await invoke("plugin:hwinfo|get_os_info");

          if (hwinfo.ram && hwinfo.ram.sizeMb) systemInfo.total_ram = hwinfo.ram.sizeMb * 1024 * 1024;
          if (hwinfo.gpu && hwinfo.gpu.vramMb) { systemInfo.total_vram = hwinfo.gpu.vramMb * 1024 * 1024; systemInfo.has_gpu = true; }
          if (hwinfo.cpu && hwinfo.cpu.threads) systemInfo.cpu_logical_cores = hwinfo.cpu.threads;
        } catch (hwe) {
          console.warn("hwinfo 插件获取失败，使用原有数据:", hwe);
        }

        updateHardwareBar();
        setActiveNav("home-btn");
      } catch (e) {
        console.error("获取系统信息失败:", e);
        document.getElementById("ram-info").textContent = "加载失败";
      }
    }

    setTimeout(() => { checkForUpdate(true); }, 3000);

    init();
    renderRoute();
  </script>
</body>
</html>
