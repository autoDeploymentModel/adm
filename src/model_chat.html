<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型交互</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #model-header {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: #0f3460;
      border-bottom: 1px solid #1a1a3e;
      flex-shrink: 0;
      gap: 12px;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #e0e0e0;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #model-name {
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
    }

    .header-status {
      margin-left: auto;
      font-size: 12px;
      color: #4caf50;
    }

     #model-iframe {
       width: 100%;
       height: 100%;
       border: none;
       background: #ffffff;
     }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 10;
    }

    .loading-overlay .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(108, 99, 255, 0.3);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    .loading-overlay p {
      color: #a0a0c0;
      font-size: 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div style="display:flex;flex-direction:column;height:100vh;">
    <div id="model-header">
      <button class="back-btn" onclick="goBack()">&#8592; 返回</button>
      <span id="model-name">模型交互界面</span>
      <span class="header-status" id="connection-status">连接中...</span>
    </div>
    <div style="position: relative; flex: 1;">
      <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <p>正在连接模型服务...</p>
      </div>
      <iframe id="model-iframe" src="about:blank"></iframe>
    </div>
  </div>

  <script>
    function getQueryParams() {
      const params = {};
      const search = window.location.search.substring(1);
      if (search) {
        search.split("&").forEach((pair) => {
          const [key, value] = pair.split("=");
          params[decodeURIComponent(key)] = decodeURIComponent(value || "");
        });
      }
      return params;
    }

    function goBack() {
      window.parent.postMessage({ type: "navigate", page: "model_list.html" }, "*");
    }

    function init() {
      const params = getQueryParams();
      const modelId = params.model_id || "未知模型";
      const port = params.port || 8080;

      document.getElementById("model-name").textContent = modelId + " - 交互界面";

      const iframe = document.getElementById("model-iframe");
      const overlay = document.getElementById("loading-overlay");
      const statusEl = document.getElementById("connection-status");
      const loadingText = overlay.querySelector("p");

      const serverUrl = "http://127.0.0.1:" + port;

      // 页面加载时先显示中文提示
      loadingText.textContent = "模型启动中，请耐心等待...";

      // 轮询检测服务是否就绪
      let retryCount = 0;
      const maxRetries = 120; // 最多等 2 分钟（每1秒检测一次）

      function checkService() {
        // 创建一个临时 img 或 XHR 检测服务是否可用
        const xhr = new XMLHttpRequest();
        xhr.open("GET", serverUrl, true);
        xhr.timeout = 3000;
        xhr.onload = function () {
          // 服务就绪，加载 iframe
          loadingText.textContent = "正在连接模型服务...";
          iframe.onload = function () {
            overlay.style.display = "none";
            statusEl.textContent = "已连接";
            statusEl.style.color = "#4caf50";
          };
          iframe.onerror = function () {
            statusEl.textContent = "连接失败";
            statusEl.style.color = "#f44336";
          };
          iframe.src = serverUrl;
        };
        xhr.onerror = function () {
          retryCount++;
          if (retryCount < maxRetries) {
            loadingText.textContent = "模型启动中，请耐心等待...（" + Math.round(retryCount / 2) + "秒）";
            setTimeout(checkService, 1000);
          } else {
            loadingText.textContent = "连接超时，请检查模型是否正常启动";
            statusEl.textContent = "连接超时";
            statusEl.style.color = "#ff9800";
          }
        };
        xhr.ontimeout = function () {
          xhr.onerror();
        };
        xhr.send();
      }

      // 延迟 1 秒开始检测
      setTimeout(checkService, 1000);
    }

    init();
  </script>
</body>
</html>
