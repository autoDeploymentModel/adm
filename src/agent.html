<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADM · Agent 终端</title>
  <link rel="stylesheet" href="vendor/xterm/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #13131f;
      color: #e0e0e0;
      overflow: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    #top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0f3460;
      padding: 8px 16px;
      font-size: 13px;
      border-bottom: 1px solid #1a1a3e;
      flex-shrink: 0;
    }
    #top-bar .title {
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #top-bar .title .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #6c63ff;
      box-shadow: 0 0 8px #6c63ff;
    }
    #top-bar .spacer { flex: 1; }
    #top-bar button {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #top-bar button:hover { background: rgba(255,255,255,0.18); }
    #top-bar button.primary { background: #6c63ff; border-color: #6c63ff; color: #fff; }
    #top-bar button.primary:hover { background: #5a52d5; }

    #terminal-wrap {
      flex: 1;
      position: relative;
      background: #13131f;
      padding: 8px 10px;
      overflow: hidden;
    }
    #terminal { width: 100%; height: 100%; }

    /* Agent 终端允许鼠标滚轮：TUI 已启用鼠标追踪，滚轮会由 xterm 转发给应用；
       应用未启用追踪时则滚动 xterm 回滚缓冲区。滚动条宽度置 0 以保持简洁外观。 */
    .xterm .xterm-viewport {
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .xterm .xterm-viewport::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(19,19,31,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
    }
    #loading-overlay.hidden { display: none !important; }
    #loading-overlay .spinner {
      width: 28px; height: 28px;
      border: 3px solid #2a2a4e;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading-overlay .loading-text { color: #a0a0c0; font-size: 14px; text-align: center; padding: 0 20px; }
    #loading-overlay .error-text { color: #ff6b6b; font-size: 14px; text-align: center; padding: 0 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 工作目录选择弹窗 */
    #workdir-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,20,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #workdir-overlay.show { display: flex; }
    .workdir-dialog {
      width: 440px;
      max-width: 90%;
      background: #1b1b2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 22px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .workdir-dialog h3 {
      margin-bottom: 6px;
      font-size: 15px;
      color: #fff;
    }
    .workdir-dialog .wd-desc {
      font-size: 12px;
      color: #9090b0;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .workdir-row {
      display: flex;
      gap: 8px;
    }
    .workdir-row input {
      flex: 1;
      background: #13131f;
      border: 1px solid #2a2a4e;
      color: #e0e0e0;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .workdir-row input:focus { border-color: #6c63ff; }
    .workdir-row button {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 0 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .workdir-row button:hover { background: rgba(255,255,255,0.18); }
    .workdir-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .workdir-actions button {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .workdir-actions .btn-cancel {
      background: transparent;
      color: #b0b0c8;
    }
    .workdir-actions .btn-ok {
      background: #6c63ff;
      border-color: #6c63ff;
      color: #fff;
    }
    .workdir-actions .btn-ok:hover { background: #5a52d5; }
    .workdir-actions .btn-cancel:hover { background: rgba(255,255,255,0.08); }
    .workdir-error { color: #ff6b6b; font-size: 12px; margin-top: 10px; min-height: 14px; }

    /* 添加云端模型弹窗 */
    #cloud-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,20,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #cloud-overlay.show { display: flex; }
    .cloud-dialog {
      width: 480px;
      max-width: 92%;
      max-height: 90%;
      overflow-y: auto;
      background: #1b1b2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 22px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .cloud-dialog h3 {
      margin-bottom: 4px;
      font-size: 15px;
      color: #fff;
    }
    .cloud-dialog .cloud-desc {
      font-size: 12px;
      color: #9090b0;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .cloud-field { margin-bottom: 14px; }
    .cloud-field label {
      display: block;
      font-size: 12px;
      color: #c0c0d8;
      margin-bottom: 6px;
    }
    .cloud-field label .hint { color: #6a6a8a; font-size: 11px; margin-left: 4px; }
    .cloud-field input {
      width: 100%;
      background: #13131f;
      border: 1px solid #2a2a4e;
      color: #e0e0e0;
      padding: 9px 11px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
    }
    .cloud-field input:focus { border-color: #6c63ff; }
    .cloud-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }
    .cloud-actions button {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .cloud-actions .btn-cancel {
      background: transparent;
      color: #b0b0c8;
    }
    .cloud-actions .btn-ok {
      background: #6c63ff;
      border-color: #6c63ff;
      color: #fff;
    }
    .cloud-actions .btn-ok:hover { background: #5a52d5; }
    .cloud-actions .btn-cancel:hover { background: rgba(255,255,255,0.08); }
    .cloud-actions button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .cloud-msg { font-size: 12px; margin-top: 12px; min-height: 15px; }
    .cloud-msg.error { color: #ff6b6b; }
    .cloud-msg.success { color: #5ad17a; }

    /* 模型管理弹窗 */
    #manage-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,20,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 25;
    }
    #manage-overlay.show { display: flex; }
    .manage-dialog {
      width: 480px;
      max-width: 92%;
      max-height: 80%;
      display: flex;
      flex-direction: column;
      background: #1b1b2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 22px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .manage-dialog h3 {
      margin-bottom: 4px;
      font-size: 15px;
      color: #fff;
    }
    .manage-dialog .manage-desc {
      font-size: 12px;
      color: #9090b0;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .manage-list {
      flex: 1;
      overflow-y: auto;
      margin: 0 -6px;
      padding: 0 6px;
    }
    .manage-empty {
      color: #9090b0;
      font-size: 13px;
      text-align: center;
      padding: 24px 0;
    }
    .manage-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      background: #13131f;
      border: 1px solid #2a2a4e;
      border-radius: 8px;
      margin-bottom: 9px;
    }
    .manage-item .mi-name {
      flex: 1;
      font-size: 13px;
      color: #e0e0e0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .manage-item .mi-meta {
      font-size: 11px;
      color: #6a6a8a;
      margin-right: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }
    .manage-item button {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .manage-item button:hover { background: rgba(255,255,255,0.18); }
    .manage-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .manage-actions button {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: #b0b0c8;
    }
    .manage-actions button:hover { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div id="app">
    <div id="top-bar">
      <div class="title"><span class="dot"></span>Agent 终端</div>
      <div class="spacer"></div>
      <button onclick="openCloudDialog()">添加云端模型</button>
      <button onclick="openManageDialog()">模型管理</button>
      <button onclick="openWorkdirDialog()">设置工作目录</button>
      <button class="primary" onclick="stopAndHome()">停止并返回</button>
    </div>
    <div id="terminal-wrap">
      <div id="terminal"></div>
      <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">正在启动终端并加载 admAgent…</div>
      </div>
    </div>

    <!-- 工作目录选择弹窗 -->
    <div id="workdir-overlay">
      <div class="workdir-dialog">
        <h3>设置 Agent 工作目录</h3>
        <div class="wd-desc">请设置您的工作目录</div>
        <div class="workdir-row">
          <input id="workdir-input" type="text" placeholder="例如：D:\projects 或 /Users/me/workspace" autocomplete="off" />
          <button onclick="browseWorkdir()">浏览…</button>
        </div>
        <div class="workdir-error" id="workdir-error"></div>
        <div class="workdir-actions">
          <button class="btn-cancel" id="workdir-cancel" onclick="closeWorkdirDialog(true)">取消</button>
          <button class="btn-ok" onclick="confirmWorkdir()">确定</button>
        </div>
      </div>
    </div>

    <!-- 添加云端模型弹窗 -->
    <div id="cloud-overlay">
      <div class="cloud-dialog">
        <h3 id="cloud-title">添加云端模型</h3>
        <div class="cloud-desc">添加一个兼容 OpenAI 的云端模型 Provider，配置将写入 admAgent.json 的 providers 分支。</div>
        <div class="cloud-field">
          <label>模型名称<span class="hint">（作为 Provider 与模型展示名，例如 Xiaomi MiMo）</span></label>
          <input id="cloud-name" type="text" placeholder="例如：Xiaomi MiMo" autocomplete="off" />
        </div>
        <div class="cloud-field">
          <label>Base URL<span class="hint">（API 地址，例如 https://api.xiaomimimo.com/v1）</span></label>
          <input id="cloud-base-url" type="text" placeholder="https://your-endpoint/v1" autocomplete="off" />
        </div>
        <div class="cloud-field">
          <label>API Key</label>
          <input id="cloud-api-key" type="text" placeholder="sk-..." autocomplete="off" />
        </div>
        <div class="cloud-field">
          <label>上下文大小<span class="hint">（tokens，默认 256K = 256000，支持 256K / 1M 写法）</span></label>
          <input id="cloud-ctx" type="text" value="256000" autocomplete="off" />
        </div>
        <div class="cloud-msg" id="cloud-msg"></div>
        <div class="cloud-actions">
          <button class="btn-cancel" onclick="closeCloudDialog()">取消</button>
          <button id="cloud-ok-btn" class="btn-ok" onclick="confirmCloudModel()">确认添加</button>
        </div>
      </div>
    </div>

    <!-- 模型管理弹窗 -->
    <div id="manage-overlay">
      <div class="manage-dialog">
        <h3>模型管理</h3>
        <div class="manage-desc">已添加的云端模型列表，点击「编辑」可修改其全部参数。</div>
        <div id="manage-list" class="manage-list"></div>
        <div class="manage-actions">
          <button onclick="closeManageDialog()">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script src="vendor/xterm/xterm.js"></script>
  <script src="vendor/xterm/addon-fit.js"></script>
  <script>
    // ===== Tauri IPC（iframe 兼容 macOS 回退到父窗口）=====
    var invoke = (function () {
      var invokeId = 0, pending = {};
      window.addEventListener("message", function (e) {
        if (e.data && e.data.type === "__invoke_result__") {
          var p = pending[e.data.id];
          if (p) {
            if (e.data.error) p.reject(new Error(e.data.error));
            else p.resolve(e.data.result);
            delete pending[e.data.id];
          }
        }
      });
      function resolveDirect() {
        return window.__TAURI__?.core?.invoke
          || window.__TAURI_INTERNALS__?.invoke
          || window.parent?.__TAURI_INTERNALS__?.invoke
          || window.parent?.__TAURI__?.core?.invoke;
      }
      var direct = resolveDirect();
      if (typeof direct === "function") return direct;
      return function (cmd, args) {
        var fn = resolveDirect();
        if (fn) return fn(cmd, args);
        return new Promise(function (resolve, reject) {
          var id = ++invokeId;
          pending[id] = { resolve: resolve, reject: reject };
          window.parent.postMessage({ type: "__invoke__", cmd: cmd, args: args, id: id }, "*");
          setTimeout(function () {
            if (pending[id]) { delete pending[id]; reject(new Error("IPC 调用超时")); }
          }, 30000);
        });
      };
    })();

    // ===== 编解码工具 =====
    function base64ToBytes(b64) {
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }
    function bytesToBase64(bytes) {
      var bin = "";
      var chunk = 0x8000;
      for (var i = 0; i < bytes.length; i += chunk) {
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(bin);
    }
    var encoder = new TextEncoder();

    // ===== 剪贴板：复制 / 粘贴（让 agent 终端像真实终端一样支持 Ctrl+C / Ctrl+V）=====
    var clipboardReqId = 0;
    var clipboardPending = {};

    // 复制文本到系统剪贴板：优先 navigator.clipboard，失败回退到 textarea + execCommand（iframe 内更稳）
    function copyToClipboard(text) {
      return new Promise(function (resolve) {
        function fallback() {
          try {
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.setAttribute("readonly", "");
            ta.style.position = "fixed";
            ta.style.top = "-1000px";
            ta.style.opacity = "0";
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            ta.setSelectionRange(0, ta.value.length);
            var ok = document.execCommand("copy");
            document.body.removeChild(ta);
            resolve(!!ok);
          } catch (e) {
            resolve(false);
          }
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text)
            .then(function () { resolve(true); })
            .catch(function () { fallback(); });
        } else {
          fallback();
        }
      });
    }

    // 从系统剪贴板读取文本：优先 navigator.clipboard.readText，
    // 失败（iframe 内剪贴板被限制）则通过父窗口代理读取。
    function readClipboard() {
      if (navigator.clipboard && navigator.clipboard.readText) {
        return navigator.clipboard.readText();
      }
      return new Promise(function (resolve, reject) {
        var id = ++clipboardReqId;
        clipboardPending[id] = { resolve: resolve, reject: reject };
        window.parent.postMessage({ type: "agent-read-clipboard", id: id }, "*");
        setTimeout(function () {
          if (clipboardPending[id]) {
            delete clipboardPending[id];
            reject(new Error("读取剪贴板超时"));
          }
        }, 5000);
      });
    }

    // ===== 终端实例 =====
    var term, fitAddon;
    var terminalStarted = false;
    var startRequested = false;
    // 上次启动 admAgent 时记录到的模型代次；只有模型被重启（代次变化）或进程退出时，
    // 再次进入 Agent 页才会重启 admAgent。上下文配置变化但模型未重启 → 不重启。
    var currentModelGen = null;

    function goHome() {
      window.parent.postMessage({ type: "navigate", page: "model_list.html" }, "*");
    }

    // ===== 通过 postMessage 接收主窗口转发的 Tauri 事件（与 model_list.html 相同模式）=====
    function setupMessageListener() {
      window.addEventListener("message", function (event) {
        var data = event.data;
        if (!data || !data.type) return;

        switch (data.type) {
          case "agent-terminal-data":
            if (data.payload && data.payload.data && term) {
              term.write(base64ToBytes(data.payload.data));
            }
            break;
          case "agent-terminal-exit":
            if (term) {
              term.write("\r\n\x1b[33m[admAgent 进程已退出，可重新进入 Agent 页面启动]\x1b[0m\r\n");
            }
            break;
          case "agent-terminal-ready":
            hideLoading();
            if (term) {
              // PTY 已就绪：重新 fit 并把实际列/行同步给后端（后端初始固定 120×30，需在此纠正为真实宽度）
              try { fitAddon.fit(); } catch (_) {}
              if (term.rows > 0 && term.cols > 0) {
                invoke("agent_terminal_resize", { rows: term.rows, cols: term.cols }).catch(function () {});
              }
              term.focus();
            }
            window.parent.postMessage({ type: "agent-focus-me" }, "*");
            break;
          case "agent-clipboard-result": {
            // 父窗口代理读取剪贴板后回填结果
            var cp = clipboardPending[data.id];
            if (cp) {
              if (data.error) cp.reject(new Error(data.error));
              else cp.resolve(data.text);
              delete clipboardPending[data.id];
            }
            break;
          }
          case "agent-resize":
            // 父窗口切换显示 Agent 页面后，重新自适应尺寸并聚焦
            if (term) {
              try { fitAddon.fit(); } catch (_) {}
              if (term.rows > 0 && term.cols > 0) {
                invoke("agent_terminal_resize", { rows: term.rows, cols: term.cols }).catch(function () {});
              }
              term.focus();
            }
            // 每次显示页面时：检测模型上下文是否变化，变化则先停旧终端再重启 admAgent；否则仅在尚未运行时启动
            handleEnterAgent();
            break;
        }
      });
    }

    function hideLoading() {
      var ov = document.getElementById("loading-overlay");
      if (ov) ov.classList.add("hidden");
    }

    function showError(msg) {
      var ov = document.getElementById("loading-overlay");
      if (ov) {
        ov.innerHTML = '<div class="error-text">' + msg + '</div>';
      }
    }

    // ===== 启动终端（先检查工作目录）=====
    async function startTerminal() {
      if (startRequested) return;
      startRequested = true;
      // 进入页面先检查工作目录是否已配置
      try {
        var wd = await invoke("get_agent_workdir");
        if (!wd || !wd.trim()) {
          // 工作目录为空：必须先设置（不启动终端，允许下次重新触发）
          startRequested = false;
          hideLoading();
          openWorkdirDialog(true);
          return;
        }
      } catch (e) {
        startRequested = false;
        hideLoading();
        openWorkdirDialog(true);
        return;
      }
      startAgentNow();
    }

    // 每次进入 Agent 页面时调用：综合判断是否需要 (重)启动 admAgent。
    // 判据（后端 get_agent_status 为权威来源，不依赖前端可能过期的标记）：
    //   - 进程已退出（running=false，含崩溃）：需要重启
    //   - 模型代次变化（模型被重启过）：需要重启
    //   - 二者都没变（哪怕只是切换页面，或仅改了上下文配置但没重启模型）：保持原状，不重启
    async function handleEnterAgent() {
      try {
        var st = await invoke("get_agent_status");
        var alive = !!(st && st.running);
        var gen = st ? st.model_generation : null;

        var keep =
          alive &&
          terminalStarted &&
          gen === currentModelGen;
        if (keep) {
          // 进程存活且模型代次未变 → 不触碰原终端（上下文配置变化但模型未重启也不重启）
          return;
        }

        // 其余情形（进程已退出 / 模型重启过 / 从未启动）一律重新启动。
        // start_agent_terminal 内部会先清理旧会话（若存在）再拉起新 admAgent，无需手动 stop。
        terminalStarted = false;
        startRequested = false;
        startTerminal();
      } catch (e) {
        // 查询失败则兜底：若当前未运行则尝试启动
        if (!terminalStarted && !startRequested) {
          terminalStarted = false;
          startRequested = false;
          startTerminal();
        }
      }
    }

    // 真正启动终端（工作目录已确认）
    async function startAgentNow() {
      var ov = document.getElementById("loading-overlay");
      if (ov) {
        ov.classList.remove("hidden");
        ov.innerHTML = '<div class="spinner"></div><div class="loading-text">正在启动终端并加载 admAgent…</div>';
      }
      // 每次 (重)启动前清空终端旧内容（含上次的「进程已退出」提示）
      if (term) { try { term.reset(); } catch (_) {} }
      try {
        // 关键：先按当前容器真实尺寸 fit，拿到真实 rows/cols，在「创建 PTY」时就传给后端。
        // 这样 admAgent 启动时读到的 PTY 宽度就是真实显示宽度，其 TUI（右边栏上下文实时统计）
        // 才不会按默认 120 列错位。（之前 PTY 写死 120 列，admAgent 按 120 布局，而实际显示更宽，
        // 且事后 agent_terminal_resize 于启动后才调用，admAent 已按旧宽度布局，故显示异常。）
        try { fitAddon.fit(); } catch (_) {}
        var initRows = term.rows > 0 ? term.rows : 30;
        var initCols = term.cols > 0 ? term.cols : 120;

        // 15 秒超时：防止后端 PTY 创建或进程 spawn 卡死
        await Promise.race([
          invoke("start_agent_terminal", { rows: initRows, cols: initCols }),
          new Promise(function (_, reject) {
            setTimeout(function () { reject(new Error("终端启动超时（15秒）")); }, 15000);
          })
        ]);
        hideLoading();
        terminalStarted = true;
        // 记录本次启动时的模型代次，模型重启后代次变化将触发 admAgent 重启
        invoke("get_agent_status")
          .then(function (st) { if (st) currentModelGen = st.model_generation; })
          .catch(function () {});
        // 兜底：再 fit + resize 一次（布局可能又变化），确保 PTY 与显示一致
        try { fitAddon.fit(); } catch (_) {}
        if (term.rows > 0 && term.cols > 0) {
          invoke("agent_terminal_resize", { rows: term.rows, cols: term.cols }).catch(function () {});
        }
      } catch (err) {
        showError("终端启动失败：" + err);
      }
    }

    async function stopAndHome() {
      try { await invoke("stop_agent_terminal", {}); } catch (_) {}
      terminalStarted = false;
      startRequested = false;
      goHome();
    }

    // 重启 Agent 终端：先停旧会话再重新拉起 admAgent，使其重新加载 admAgent.json 的最新配置
    // （新增 / 修改云端模型后必须重启才能生效）。若终端当前未运行则跳过（下次启动自然加载新配置）。
    async function restartAgentTerminal() {
      try {
        var st = await invoke("get_agent_status");
        if (!(st && st.running)) return; // 未在运行：无需重启
      } catch (_) {
        return;
      }
      try { await invoke("stop_agent_terminal", {}); } catch (_) {}
      terminalStarted = false;
      startRequested = false;
      startAgentNow();
    }

    // 解析上下文大小：支持纯数字、以及带 K（×1000）/ M（×1000000）后缀。
    // 默认 256K = 256000，与 admAgent.json 示例一致。
    function parseContextSize(raw) {
      if (raw === null || raw === undefined) return null;
      var s = String(raw).trim().toLowerCase().replace(/\s+/g, "");
      if (!s) return null;
      var mult = 1;
      if (s.endsWith("k")) { mult = 1000; s = s.slice(0, -1); }
      else if (s.endsWith("m")) { mult = 1000000; s = s.slice(0, -1); }
      var n = Number(s);
      if (!isFinite(n) || n <= 0) return null;
      return Math.round(n * mult);
    }

    // 设置/恢复添加/编辑弹窗底部按钮的禁用态（提交期间禁用，避免重复点击）
    function setCloudButtonsDisabled(disabled) {
      var okBtn = document.getElementById("cloud-ok-btn");
      var cancelBtn = document.querySelector("#cloud-overlay .btn-cancel");
      if (okBtn) okBtn.disabled = disabled;
      if (cancelBtn) cancelBtn.disabled = disabled;
    }
    // 结束一次提交：恢复标记与按钮（用于校验失败 / 保存失败时允许用户重试）
    function finishCloudSubmit() {
      cloudSubmitting = false;
      setCloudButtonsDisabled(false);
    }

    async function confirmCloudModel() {
      var msg = document.getElementById("cloud-msg");
      function setMsg(text, kind) {
        if (msg) { msg.textContent = text; msg.className = "cloud-msg" + (kind ? " " + kind : ""); }
      }

      // 防重复点击：若已在提交中，直接忽略本次点击
      if (cloudSubmitting) return;
      cloudSubmitting = true;
      setCloudButtonsDisabled(true);

      var name = (document.getElementById("cloud-name").value || "").trim();
      var baseUrl = (document.getElementById("cloud-base-url").value || "").trim();
      var apiKey = (document.getElementById("cloud-api-key").value || "").trim();
      var ctxRaw = (document.getElementById("cloud-ctx").value || "").trim();

      if (!name) { setMsg("请填写模型名称", "error"); finishCloudSubmit(); return; }
      if (!baseUrl) { setMsg("请填写 Base URL", "error"); finishCloudSubmit(); return; }
      if (!/^https?:\/\//i.test(baseUrl)) { setMsg("Base URL 需以 http:// 或 https:// 开头", "error"); finishCloudSubmit(); return; }
      if (!apiKey) { setMsg("请填写 API Key", "error"); finishCloudSubmit(); return; }
      var ctx = parseContextSize(ctxRaw);
      if (ctx === null) { setMsg("上下文大小无效（例如 256000 或 256K）", "error"); finishCloudSubmit(); return; }

      setMsg("正在保存…", "");
      try {
        var res;
        if (editingKey) {
          res = await invoke("update_cloud_provider", {
            key: editingKey,
            input: {
              name: name,
              base_url: baseUrl,
              api_key: apiKey,
              context_window: ctx
            }
          });
        } else {
          res = await invoke("add_cloud_provider", {
            input: {
              name: name,
              base_url: baseUrl,
              api_key: apiKey,
              context_window: ctx
            }
          });
        }
        var key = res && res.key ? res.key : name;
        setMsg((editingKey ? "已更新云端模型：" : "已添加云端模型：") + key + "（新配置将在 Agent 终端重启后生效）", "success");
        // 清空输入，短暂展示成功提示后（0.6s）立即关闭弹窗并重启 Agent 终端
        document.getElementById("cloud-name").value = "";
        document.getElementById("cloud-base-url").value = "";
        document.getElementById("cloud-api-key").value = "";
        setTimeout(function () {
          closeCloudDialog();
          closeManageDialog();
          restartAgentTerminal();
        }, 600);
        // 成功后按钮保持禁用（窗口即将关闭并重启），无需 finishCloudSubmit 恢复
      } catch (e) {
        setMsg((editingKey ? "更新失败：" : "添加失败：") + (e && e.message ? e.message : e), "error");
        finishCloudSubmit(); // 恢复按钮，允许用户修正后重试
      }
    }

    // 以指定 key 的 provider 数据回填表单，进入「编辑」模式

    // ===== 初始化 =====
    function initTerminal() {
      term = new Terminal({
        fontFamily: 'Menlo, Consolas, "DejaVu Sans Mono", monospace',
        fontSize: 13,
        cursorBlink: true,
        theme: {
          background: "#13131f",
          foreground: "#e0e0e0",
          cursor: "#6c63ff",
          selectionBackground: "rgba(108,99,255,0.3)",
          black: "#13131f",
          brightBlack: "#555",
        },
      });
      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById("terminal"));

      // ===== 粘贴预处理：将换行符替换为空格 =====
      // 多行文本粘贴时，换行符（\r\n / \n / \r）会被 PTY 当作 Enter 键，
      // 导致 admAgent 输入被提前提交。覆写 term.paste 拦截所有粘贴路径
      //（Ctrl+V、右键菜单、中键粘贴等），统一把换行替换为空格。
      var _originalPaste = term.paste.bind(term);
      term.paste = function (text) {
        if (text) {
          text = text.replace(/\r\n/g, ' ').replace(/\r/g, ' ').replace(/\n/g, ' ');
        }
        _originalPaste(text);
      };

      // ===== Ctrl+C / Ctrl+V 复制粘贴（模拟真实终端体验）=====
      // - 有选区时 Ctrl+C 复制，无选区时放行（把 SIGINT 发给 agent，等价于终端中断）
      // - Ctrl+V 从系统剪贴板读取并粘贴到终端
      term.attachCustomKeyEventHandler(function (e) {
        if (e.type !== "keydown") return true;
        var mod = e.ctrlKey || e.metaKey;
        if (!mod) return true;

        var k = (e.key || "").toLowerCase();
        // 复制：仅在有选区时拦截；无选区则交还给 xterm（Ctrl+C 作为中断信号，Cmd+C 在 Mac 上不发送）
        if (k === "c" && (e.ctrlKey || e.metaKey)) {
          var sel = term.getSelection();
          if (sel && sel.length > 0) {
            copyToClipboard(sel);
            e.preventDefault();
            return false; // 已处理，阻止默认（否则会触发 SIGINT）
          }
          return true; // 无选区：放行
        }
        // 粘贴
        if (k === "v" && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          readClipboard()
            .then(function (text) {
              if (text) term.paste(text);
            })
            .catch(function () {
              try { term.write("\r\n\x1b[31m[粘贴失败：无法访问剪贴板]\x1b[0m\r\n"); } catch (_) {}
            });
          return false; // 已处理
        }
        return true;
      });

      // ===== 鼠标滚轮 → PTY 转发（兜底方案）=====
      // xterm.js 只有在「鼠标追踪协议带 wheel 位（DECSET 1000/1002/1003）」时才会把滚轮
      // 编码成鼠标报文转发给 PTY；若 admAgent 的 TUI 实际未走标准鼠标追踪（或该路未生效），
      // 滚轮就到不了应用。因此这里在捕获阶段自行把滚轮转成 SGR 鼠标报文（crossterm/ratatui
      // 等 Rust TUI 默认采用此编码）直接写入 PTY，保证 admAgent 一定收到滚动。
      // 仅对 wheel 事件 stopPropagation，不影响点击 / 拖选等其它鼠标事件（那些走 xterm 自身逻辑）。
      var _wheelAccum = 0;
      var termElWheel = document.getElementById("terminal");
      if (termElWheel) {
        termElWheel.addEventListener("wheel", function (e) {
          if (!term) return;
          e.preventDefault();
          e.stopPropagation();

          // 把鼠标坐标换算成终端单元格坐标（1-based）。位置对滚轮通常只影响「在哪滚动」，
          // TUIs 大多只关心方向，这里做近似换算即可。
          var rect = termElWheel.getBoundingClientRect();
          var col = 0, row = 0;
          if (term.cols > 0 && rect.width > 0) {
            col = Math.floor((e.clientX - rect.left) / (rect.width / term.cols));
          }
          if (term.rows > 0 && rect.height > 0) {
            row = Math.floor((e.clientY - rect.top) / (rect.height / term.rows));
          }
          col = Math.max(0, Math.min(term.cols - 1, col));
          row = Math.max(0, Math.min(term.rows - 1, row));

          // 累加滚动量，跨过一行阈值才发一次，避免触控板产生的大量微事件刷屏 PTY。
          // 统一把 deltaY 换算成「像素」，兼容 deltaMode 为行(1)/页(2) 的鼠标。
          var dy = e.deltaY;
          if (e.deltaMode === 1) dy *= 16;           // 行 -> 约 16px
          else if (e.deltaMode === 2) dy *= rect.height || 480; // 页 -> 整屏高
          _wheelAccum += dy;
          var STEP = 24; // 约一行像素高度
          while (Math.abs(_wheelAccum) >= STEP) {
            var down = _wheelAccum > 0;
            _wheelAccum -= down ? STEP : -STEP;
            var action = down ? 1 : 0; // 1=下滚, 0=上滚
            // SGR wheel: button = 64 + action + 修饰键位
            var btn = 64 + action
              + (e.ctrlKey ? 16 : 0)
              + (e.shiftKey ? 4 : 0)
              + (e.altKey ? 8 : 0);
            var sgr = "\x1b[<" + btn + ";" + (col + 1) + ";" + (row + 1) + "M";
            invoke("agent_terminal_input", { data: bytesToBase64(encoder.encode(sgr)) })
              .catch(function () {});
          }
        }, { capture: true, passive: false });
      }

      // 用 ResizeObserver 兜底尺寸适配：容器（首次显示、窗口缩放、布局变化）任意尺寸变化都重新 fit。
      // observe 后会立即回调一次当前尺寸 —— 首次进入时本页面已加载、容器已可见，可拿到正确宽度，
      // 不依赖任何可能被错过的一次性事件。PTY 未建时 resize 为 no-op，建好后再由 startAgentNow 补一次。
      var roWrap = document.getElementById("terminal-wrap");
      if (roWrap && typeof ResizeObserver !== "undefined") {
        var roTimer = null;
        var ro = new ResizeObserver(function () {
          if (roTimer) clearTimeout(roTimer);
          roTimer = setTimeout(function () {
            try { fitAddon.fit(); } catch (_) {}
            if (term.rows > 0 && term.cols > 0) {
              invoke("agent_terminal_resize", { rows: term.rows, cols: term.cols }).catch(function () {});
            }
          }, 120);
        });
        ro.observe(roWrap);
      }

      // iframe 内嵌时键盘焦点容易丢失，主动聚焦 + 点击聚焦
      term.focus();
      window.parent.postMessage({ type: "agent-focus-me" }, "*");
      var termWrap = document.getElementById("terminal-wrap");
      if (termWrap) {
        termWrap.addEventListener("mousedown", function () { term.focus(); window.parent.postMessage({ type: "agent-focus-me" }, "*"); });
        termWrap.tabIndex = -1;
      }

      term.onData(function (data) {
        invoke("agent_terminal_input", { data: bytesToBase64(encoder.encode(data)) })
          .catch(function (e) {
            // 输入失败时在终端内短暂提示，便于排查
            try { term.write("\r\n\x1b[31m[输入发送失败: " + e + "]\x1b[0m\r\n"); } catch (_) {}
          });
      });

      // 监听主窗口通过 postMessage 转发的 Tauri 事件
      setupMessageListener();

      window.addEventListener("resize", function () {
        try {
          fitAddon.fit();
          if (term.rows > 0 && term.cols > 0) {
            invoke("agent_terminal_resize", { rows: term.rows, cols: term.cols }).catch(function () {});
          }
        } catch (_) {}
      });

      startTerminal();
    }

    window.addEventListener("DOMContentLoaded", initTerminal);
  </script>
</body>
</html>
