<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADM · Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #13131f;
      color: #e0e0e0;
      overflow: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    #top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0f3460;
      padding: 8px 16px;
      font-size: 13px;
      border-bottom: 1px solid #1a1a3e;
      flex-shrink: 0;
    }
    #top-bar .title {
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #top-bar .title .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #6c63ff;
      box-shadow: 0 0 8px #6c63ff;
    }
    #top-bar .spacer { flex: 1; }
    #top-bar button {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #top-bar button:hover { background: rgba(255,255,255,0.18); }
    #top-bar button.primary { background: #6c63ff; border-color: #6c63ff; color: #fff; }
    #top-bar button.primary:hover { background: #5a52d5; }

    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      gap: 24px;
    }

    .status-card {
      width: 100%;
      max-width: 520px;
      background: #1b1b2e;
      border: 1px solid #2a2a4e;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
    }
    .status-icon {
      width: 56px; height: 56px;
      margin: 0 auto 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .status-icon.running { background: rgba(108,99,255,0.15); box-shadow: 0 0 20px rgba(108,99,255,0.3); }
    .status-icon.stopped { background: rgba(100,100,140,0.15); }
    .status-label {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }
    .status-desc {
      font-size: 13px;
      color: #9090b0;
      line-height: 1.6;
      white-space: pre-line;
    }

    .action-area {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .action-area button {
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      transition: all 0.2s;
    }
    .action-area .btn-start {
      background: #6c63ff;
      border-color: #6c63ff;
      color: #fff;
    }
    .action-area .btn-start:hover { background: #5a52d5; }
    .action-area .btn-stop {
      background: rgba(255,100,100,0.15);
      border-color: rgba(255,100,100,0.3);
      color: #ff8a8a;
    }
    .action-area .btn-stop:hover { background: rgba(255,100,100,0.25); }
    .action-area .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
    }
    .action-area .btn-secondary:hover { background: rgba(255,255,255,0.18); }

    /* 工作目录选择弹窗 */
    #workdir-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,20,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #workdir-overlay.show { display: flex; }
    .workdir-dialog {
      width: 440px;
      max-width: 90%;
      background: #1b1b2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 22px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .workdir-dialog h3 { margin-bottom: 6px; font-size: 15px; color: #fff; }
    .workdir-dialog .wd-desc { font-size: 12px; color: #9090b0; margin-bottom: 16px; line-height: 1.5; }
    .workdir-row { display: flex; gap: 8px; }
    .workdir-row input {
      flex: 1; background: #13131f; border: 1px solid #2a2a4e;
      color: #e0e0e0; padding: 8px 10px; border-radius: 6px; font-size: 13px; outline: none;
    }
    .workdir-row input:focus { border-color: #6c63ff; }
    .workdir-row button {
      background: rgba(255,255,255,0.08); color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12); padding: 0 14px;
      border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap;
    }
    .workdir-row button:hover { background: rgba(255,255,255,0.18); }
    .workdir-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .workdir-actions button {
      padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .workdir-actions .btn-cancel { background: transparent; color: #b0b0c8; }
    .workdir-actions .btn-ok { background: #6c63ff; border-color: #6c63ff; color: #fff; }
    .workdir-actions .btn-ok:hover { background: #5a52d5; }
    .workdir-actions .btn-cancel:hover { background: rgba(255,255,255,0.08); }
    .workdir-error { color: #ff6b6b; font-size: 12px; margin-top: 10px; min-height: 14px; }

    /* 初始化 loading */
    #loading-overlay {
      position: fixed; inset: 0; background: rgba(19,19,31,0.92);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 30;
    }
    #loading-overlay.hidden { display: none !important; }
    #loading-overlay .spinner {
      width: 28px; height: 28px; border: 3px solid #2a2a4e; border-top-color: #6c63ff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    #loading-overlay .loading-text { color: #a0a0c0; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div id="top-bar">
      <div class="title"><span class="dot"></span>Agent 管理</div>
      <div class="spacer"></div>
    </div>

    <div id="content">
      <div class="status-card">
        <div id="status-icon" class="status-icon stopped">&#9632;</div>
        <div id="status-label" class="status-label">Agent 未运行</div>
        <div id="status-desc" class="status-desc">点击下方按钮启动 Agent 终端，将在独立的控制台窗口中运行。</div>
      </div>

      <div class="action-area">
        <button id="btn-start" class="btn-start" onclick="startAgent()">启动 Agent</button>
        <button id="btn-stop" class="btn-stop" onclick="stopAgent()" style="display:none">停止 Agent</button>
        <button class="btn-secondary" onclick="openWorkdirDialog()">设置工作目录</button>
        <button class="btn-secondary" onclick="goHome()">返回首页</button>
        <button class="btn-stop" onclick="stopAndHome()">停止并返回</button>
      </div>
    </div>

    <!-- 工作目录选择弹窗 -->
    <div id="workdir-overlay">
      <div class="workdir-dialog">
        <h3>设置 Agent 工作目录</h3>
        <div class="wd-desc">请设置 Agent 的工作目录，admAgent 会在此目录下执行。</div>
        <div class="workdir-row">
          <input id="workdir-input" type="text" placeholder="例如：D:\projects 或 /Users/me/workspace" autocomplete="off" />
          <button onclick="browseWorkdir()">浏览…</button>
        </div>
        <div class="workdir-error" id="workdir-error"></div>
        <div class="workdir-actions">
          <button class="btn-cancel" onclick="closeWorkdirDialog()">取消</button>
          <button class="btn-ok" onclick="confirmWorkdir()">确定</button>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text" id="loading-text">正在启动 Agent…</div>
    </div>
  </div>

  <script>
    // ===== Tauri IPC（iframe 兼容 macOS 回退到父窗口）=====
    var invoke = (function () {
      var invokeId = 0, pending = {};
      window.addEventListener("message", function (e) {
        if (e.data && e.data.type === "__invoke_result__") {
          var p = pending[e.data.id];
          if (p) {
            if (e.data.error) p.reject(new Error(e.data.error));
            else p.resolve(e.data.result);
            delete pending[e.data.id];
          }
        }
      });
      function resolveDirect() {
        return window.__TAURI__?.core?.invoke
          || window.__TAURI_INTERNALS__?.invoke
          || window.parent?.__TAURI_INTERNALS__?.invoke
          || window.parent?.__TAURI__?.core?.invoke;
      }
      var direct = resolveDirect();
      if (typeof direct === "function") return direct;
      return function (cmd, args) {
        var fn = resolveDirect();
        if (fn) return fn(cmd, args);
        return new Promise(function (resolve, reject) {
          var id = ++invokeId;
          pending[id] = { resolve: resolve, reject: reject };
          window.parent.postMessage({ type: "__invoke__", cmd: cmd, args: args, id: id }, "*");
          setTimeout(function () {
            if (pending[id]) { delete pending[id]; reject(new Error("IPC 调用超时")); }
          }, 30000);
        });
      };
    })();

    var currentModelGen = null;
    var _starting = false; // 防止并发启动

    function goHome() {
      window.parent.postMessage({ type: "navigate", page: "model_list.html" }, "*");
    }

    function hideLoading() {
      var ov = document.getElementById("loading-overlay");
      if (ov) ov.classList.add("hidden");
    }

    function showLoading(text) {
      var ov = document.getElementById("loading-overlay");
      if (ov) {
        ov.classList.remove("hidden");
        var t = document.getElementById("loading-text");
        if (t && text) t.textContent = text;
      }
    }

    function setUIState(running) {
      var iconEl = document.getElementById("status-icon");
      var labelEl = document.getElementById("status-label");
      var descEl = document.getElementById("status-desc");
      var btnStart = document.getElementById("btn-start");
      var btnStop = document.getElementById("btn-stop");

      if (running) {
        iconEl.className = "status-icon running";
        iconEl.textContent = "▶";
        labelEl.textContent = "Agent 运行中";
        descEl.textContent = "Agent 终端已在独立的控制台窗口中打开。\n在终端窗口中进行交互，关闭窗口后此处状态将更新。";
        btnStart.style.display = "none";
        btnStop.style.display = "";
      } else {
        iconEl.className = "status-icon stopped";
        iconEl.textContent = "■";
        labelEl.textContent = "Agent 未运行";
        descEl.textContent = "点击下方按钮启动 Agent 终端，将在独立的控制台窗口中运行。";
        btnStart.style.display = "";
        btnStop.style.display = "none";
      }
    }

    async function startAgent() {
      if (_starting) return; // 防并发
      _starting = true;
      try {
        // 先检查工作目录
        var wd = await invoke("get_agent_workdir");
        if (!wd || !wd.trim()) {
          openWorkdirDialog(true);
          return;
        }

        showLoading("正在启动 Agent…");
        await invoke("start_agent_terminal", {});
        // 记录模型代次
        var st = await invoke("get_agent_status");
        if (st) currentModelGen = st.model_generation;
        setUIState(true);
        hideLoading();
      } catch (err) {
        hideLoading();
        var descEl = document.getElementById("status-desc");
        if (descEl) descEl.textContent = "启动失败：" + err;
      } finally {
        _starting = false;
      }
    }

    async function stopAgent() {
      try { await invoke("stop_agent_terminal", {}); } catch (_) {}
      setUIState(false);
    }

    async function stopAndHome() {
      try { await invoke("stop_agent_terminal", {}); } catch (_) {}
      goHome();
    }

    // ===== 工作目录选择弹窗 =====

    function openWorkdirDialog(required) {
      var overlay = document.getElementById("workdir-overlay");
      var input = document.getElementById("workdir-input");
      var err = document.getElementById("workdir-error");
      if (err) err.textContent = "";
      try {
        invoke("get_agent_workdir").then(function (wd) {
          if (input && wd) input.value = wd;
        }).catch(function () {});
      } catch (_) {}
      if (overlay) overlay.classList.add("show");
      if (input) setTimeout(function () { input.focus(); }, 50);
    }

    function closeWorkdirDialog() {
      var overlay = document.getElementById("workdir-overlay");
      if (overlay) overlay.classList.remove("show");
    }

    async function browseWorkdir() {
      try {
        var result = await invoke("plugin:dialog|open", {
          options: { directory: true, multiple: false, title: "选择 Agent 工作目录" }
        });
        if (result && typeof result === "string") {
          var input = document.getElementById("workdir-input");
          if (input) input.value = result;
        }
      } catch (e) {
        var err = document.getElementById("workdir-error");
        if (err) err.textContent = "打开选择器失败：" + e;
      }
    }

    async function confirmWorkdir() {
      var input = document.getElementById("workdir-input");
      var err = document.getElementById("workdir-error");
      var val = input ? input.value.trim() : "";
      if (!val) {
        if (err) err.textContent = "工作目录不能为空";
        return;
      }
      try {
        var wasRunning = false;
        try {
          var st = await invoke("get_agent_status");
          wasRunning = !!(st && st.running);
        } catch (_) {}
        // 先停掉旧终端
        if (wasRunning) {
          try { await invoke("stop_agent_terminal", {}); } catch (_) {}
        }
        // 保存新工作目录
        await invoke("set_agent_workdir", { workdir: val });
        closeWorkdirDialog();
        // 自动重启
        if (wasRunning) {
          await startAgent();
        } else {
          setUIState(false);
        }
      } catch (e) {
        if (err) err.textContent = "保存失败：" + e;
      }
    }

    // ===== 初始化 =====
    // 仅检查状态并更新 UI，不自动启动
    async function checkStatus() {
      try {
        var st = await invoke("get_agent_status");
        var alive = !!(st && st.running);
        if (alive && st) currentModelGen = st.model_generation;
        setUIState(alive);
      } catch (e) {
        setUIState(false);
      }
    }

    // 每 2 秒轮询一次 Agent 进程状态，用于检测手动关闭终端等外部事件
    var _statusTimer = null;
    function startStatusPolling() {
      if (_statusTimer) return; // 已启动
      _statusTimer = setInterval(function () {
        checkStatus();
      }, 2000);
    }

    // 首次进入且未运行时尝试自动启动
    async function checkStatusAndMaybeStart() {
      if (_starting) return; // 与其他启动路径互斥
      try {
        var st = await invoke("get_agent_status");
        var alive = !!(st && st.running);
        var gen = st ? st.model_generation : null;

        if (alive && gen === currentModelGen) {
          setUIState(true);
          return;
        }

        // 需要启动（首次进入 / 进程已退出 / 模型已重启）
        if (!alive && gen !== null) {
          currentModelGen = gen;
          var wd = await invoke("get_agent_workdir");
          if (!wd || !wd.trim()) {
            setUIState(false);
            openWorkdirDialog(true);
            return;
          }
          await startAgent();
        } else {
          setUIState(false);
        }
      } catch (e) {
        setUIState(false);
      }
    }

    window.addEventListener("message", function (event) {
      var data = event.data;
      if (!data || !data.type) return;
      // 主窗口通知切换到 agent 页面时，仅同步状态（不重复触发启动）
      if (data.type === "agent-resize") {
        checkStatus();
      }
    });

    window.addEventListener("DOMContentLoaded", function () {
      // 默认隐藏 loading 遮罩层（CSS 中默认为 display:flex）
      hideLoading();
      checkStatusAndMaybeStart().catch(function () { setUIState(false); });
      // 启动定时轮询：每 2 秒检测 Agent 是否仍在运行
      startStatusPolling();
    });
  </script>
</body>
</html>
