<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADM · Agent 终端</title>
  <link rel="stylesheet" href="vendor/xterm/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #13131f;
      color: #e0e0e0;
      overflow: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; }

    #top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #0f3460;
      padding: 8px 16px;
      font-size: 13px;
      border-bottom: 1px solid #1a1a3e;
      flex-shrink: 0;
    }
    #top-bar .title {
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #top-bar .title .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #6c63ff;
      box-shadow: 0 0 8px #6c63ff;
    }
    #top-bar .spacer { flex: 1; }
    #top-bar button {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #top-bar button:hover { background: rgba(255,255,255,0.18); }
    #top-bar button.primary { background: #6c63ff; border-color: #6c63ff; color: #fff; }
    #top-bar button.primary:hover { background: #5a52d5; }

    #terminal-wrap {
      flex: 1;
      position: relative;
      background: #13131f;
      padding: 8px 10px;
      overflow: hidden;
    }
    #terminal { width: 100%; height: 100%; }

    /* Agent 终端允许鼠标滚轮：TUI 已启用鼠标追踪，滚轮会由 xterm 转发给应用；
       应用未启用追踪时则滚动 xterm 回滚缓冲区。滚动条宽度置 0 以保持简洁外观。 */
    .xterm .xterm-viewport {
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .xterm .xterm-viewport::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(19,19,31,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
    }
    #loading-overlay.hidden { display: none !important; }
    #loading-overlay .spinner {
      width: 28px; height: 28px;
      border: 3px solid #2a2a4e;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading-overlay .loading-text { color: #a0a0c0; font-size: 14px; text-align: center; padding: 0 20px; }
    #loading-overlay .error-text { color: #ff6b6b; font-size: 14px; text-align: center; padding: 0 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 工作目录选择弹窗 */
    #workdir-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,20,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #workdir-overlay.show { display: flex; }
    .workdir-dialog {
      width: 440px;
      max-width: 90%;
      background: #1b1b2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 22px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .workdir-dialog h3 {
      margin-bottom: 6px;
      font-size: 15px;
      color: #fff;
    }
    .workdir-dialog .wd-desc {
      font-size: 12px;
      color: #9090b0;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .workdir-row {
      display: flex;
      gap: 8px;
    }
    .workdir-row input {
      flex: 1;
      background: #13131f;
      border: 1px solid #2a2a4e;
      color: #e0e0e0;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .workdir-row input:focus { border-color: #6c63ff; }
    .workdir-row button {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 0 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .workdir-row button:hover { background: rgba(255,255,255,0.18); }
    .workdir-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .workdir-actions button {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .workdir-actions .btn-cancel {
      background: transparent;
      color: #b0b0c8;
    }
    .workdir-actions .btn-ok {
      background: #6c63ff;
      border-color: #6c63ff;
      color: #fff;
    }
    .workdir-actions .btn-ok:hover { background: #5a52d5; }
    .workdir-actions .btn-cancel:hover { background: rgba(255,255,255,0.08); }
    .workdir-error { color: #ff6b6b; font-size: 12px; margin-top: 10px; min-height: 14px; }

    /* 添加云端模型弹窗 */
    #cloud-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,20,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #cloud-overlay.show { display: flex; }
    .cloud-dialog {
      width: 480px;
      max-width: 92%;
      max-height: 90%;
      overflow-y: auto;
      background: #1b1b2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 22px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .cloud-dialog h3 {
      margin-bottom: 4px;
      font-size: 15px;
      color: #fff;
    }
    .cloud-dialog .cloud-desc {
      font-size: 12px;
      color: #9090b0;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .cloud-field { margin-bottom: 14px; }
    .cloud-field label {
      display: block;
      font-size: 12px;
      color: #c0c0d8;
      margin-bottom: 6px;
    }
    .cloud-field label .hint { color: #6a6a8a; font-size: 11px; margin-left: 4px; }
    .cloud-field input {
      width: 100%;
      background: #13131f;
      border: 1px solid #2a2a4e;
      color: #e0e0e0;
      padding: 9px 11px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
    }
    .cloud-field input:focus { border-color: #6c63ff; }
    .cloud-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }
    .cloud-actions button {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .cloud-actions .btn-cancel {
      background: transparent;
      color: #b0b0c8;
    }
    .cloud-actions .btn-ok {
      background: #6c63ff;
      border-color: #6c63ff;
      color: #fff;
    }
    .cloud-actions .btn-ok:hover { background: #5a52d5; }
    .cloud-actions .btn-cancel:hover { background: rgba(255,255,255,0.08); }
    .cloud-actions button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .cloud-msg { font-size: 12px; margin-top: 12px; min-height: 15px; }
    .cloud-msg.error { color: #ff6b6b; }
    .cloud-msg.success { color: #5ad17a; }

    /* 模型管理弹窗 */
    #manage-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,20,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 25;
    }
    #manage-overlay.show { display: flex; }
    .manage-dialog {
      width: 480px;
      max-width: 92%;
      max-height: 80%;
      display: flex;
      flex-direction: column;
      background: #1b1b2e;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 22px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .manage-dialog h3 {
      margin-bottom: 4px;
      font-size: 15px;
      color: #fff;
    }
    .manage-dialog .manage-desc {
      font-size: 12px;
      color: #9090b0;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .manage-list {
      flex: 1;
      overflow-y: auto;
      margin: 0 -6px;
      padding: 0 6px;
    }
    .manage-empty {
      color: #9090b0;
      font-size: 13px;
      text-align: center;
      padding: 24px 0;
    }
    .manage-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      background: #13131f;
      border: 1px solid #2a2a4e;
      border-radius: 8px;
      margin-bottom: 9px;
    }
    .manage-item .mi-name {
      flex: 1;
      font-size: 13px;
      color: #e0e0e0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .manage-item .mi-meta {
      font-size: 11px;
      color: #6a6a8a;
      margin-right: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }
    .manage-item button {
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .manage-item button:hover { background: rgba(255,255,255,0.18); }
    .manage-item button.delete-btn {
      color: #ff6b6b;
      border-color: rgba(255,107,107,0.3);
    }
    .manage-item button.delete-btn:hover {
      background: rgba(255,107,107,0.18);
    }
    .manage-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .manage-actions button {
      padding: 8px 18px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: #b0b0c8;
    }
    .manage-actions button:hover { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div id="app">
    <div id="top-bar">
      <div class="title"><span class="dot"></span>Agent 终端</div>
      <div class="spacer"></div>
      <button onclick="openCloudDialog()">添加云端模型</button>
      <button onclick="openManageDialog()">模型管理</button>
      <button onclick="openWorkdirDialog()">设置工作目录</button>
      <button class="primary" onclick="stopAndHome()">停止并返回</button>
    </div>
    <div id="terminal-wrap">
      <div id="terminal"></div>
      <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">正在启动终端并加载 admAgent…</div>
      </div>
    </div>

    <!-- 工作目录选择弹窗 -->
    <div id="workdir-overlay">
      <div class="workdir-dialog">
        <h3>设置 Agent 工作目录</h3>
        <div class="wd-desc">请设置您的工作目录</div>
        <div class="workdir-row">
          <input id="workdir-input" type="text" placeholder="例如：D:\projects 或 /Users/me/workspace" autocomplete="off" />
          <button onclick="browseWorkdir()">浏览…</button>
        </div>
        <div class="workdir-error" id="workdir-error"></div>
        <div class="workdir-actions">
          <button class="btn-cancel" id="workdir-cancel" onclick="closeWorkdirDialog(true)">取消</button>
          <button class="btn-ok" onclick="confirmWorkdir()">确定</button>
        </div>
      </div>
    </div>

    <!-- 添加云端模型弹窗 -->
    <div id="cloud-overlay">
      <div class="cloud-dialog">
        <h3 id="cloud-title">添加云端模型</h3>
        <div class="cloud-desc">添加一个兼容 OpenAI 的云端模型 Provider，配置将写入 admAgent.json 的 providers 分支。</div>
        <div class="cloud-field">
          <label>模型名称<span class="hint">（作为 Provider 与模型展示名，例如 Xiaomi MiMo）</span></label>
          <input id="cloud-name" type="text" placeholder="例如：Xiaomi MiMo" autocomplete="off" />
        </div>
        <div class="cloud-field">
          <label>Base URL<span class="hint">（API 地址，例如 https://api.xiaomimimo.com/v1）</span></label>
          <input id="cloud-base-url" type="text" placeholder="https://your-endpoint/v1" autocomplete="off" />
        </div>
        <div class="cloud-field">
          <label>API Key</label>
          <input id="cloud-api-key" type="text" placeholder="sk-..." autocomplete="off" />
        </div>
        <div class="cloud-field">
          <label>上下文大小<span class="hint">（tokens，默认 256K = 256000，支持 256K / 1M 写法）</span></label>
          <input id="cloud-ctx" type="text" value="256000" autocomplete="off" />
        </div>
        <div class="cloud-msg" id="cloud-msg"></div>
        <div class="cloud-actions">
          <button class="btn-cancel" onclick="closeCloudDialog()">取消</button>
          <button id="cloud-ok-btn" class="btn-ok" onclick="confirmCloudModel()">确认添加</button>
        </div>
      </div>
    </div>

    <!-- 模型管理弹窗 -->
    <div id="manage-overlay">
      <div class="manage-dialog">
        <h3>模型管理</h3>
        <div class="manage-desc">已添加的云端模型列表，点击「编辑」可修改其全部参数。</div>
        <div id="manage-list" class="manage-list"></div>
        <div class="manage-actions">
          <button onclick="closeManageDialog()">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script src="vendor/xterm/xterm.js"></script>
  <script src="vendor/xterm/addon-fit.js"></script>
  <script>
    // ===== 平台检测（通过后端 API，比 userAgent 更可靠）=====
    var _platform = null;
    async function detectPlatform() {
      if (_platform) return _platform;
      try {
        _platform = String(await invoke("get_platform_os")).toLowerCase();
      } catch (_) {
        _platform = 'unknown';
      }
      return _platform;
    }
    // ===== Tauri IPC（iframe 兼容 macOS 回退到父窗口）=====
    var invoke = (function () {
      var invokeId = 0, pending = {};
      window.addEventListener("message", function (e) {
        if (e.data && e.data.type === "__invoke_result__") {
          var p = pending[e.data.id];
          if (p) {
            if (e.data.error) p.reject(new Error(e.data.error));
            else p.resolve(e.data.result);
            delete pending[e.data.id];
          }
        }
      });
      function resolveDirect() {
        return window.__TAURI__?.core?.invoke
          || window.__TAURI_INTERNALS__?.invoke
          || window.parent?.__TAURI_INTERNALS__?.invoke
          || window.parent?.__TAURI__?.core?.invoke;
      }
      var direct = resolveDirect();
      if (typeof direct === "function") return direct;
      return function (cmd, args) {
        var fn = resolveDirect();
        if (fn) return fn(cmd, args);
        return new Promise(function (resolve, reject) {
          var id = ++invokeId;
          pending[id] = { resolve: resolve, reject: reject };
          window.parent.postMessage({ type: "__invoke__", cmd: cmd, args: args, id: id }, "*");
          setTimeout(function () {
            if (pending[id]) { delete pending[id]; reject(new Error("IPC 调用超时")); }
          }, 30000);
        });
      };
    })();

    // ===== 编解码工具 =====
    function base64ToBytes(b64) {
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }
    function bytesToBase64(bytes) {
      var bin = "";
      var chunk = 0x8000;
      for (var i = 0; i < bytes.length; i += chunk) {
        bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(bin);
    }
    var encoder = new TextEncoder();

    // ===== 剪贴板：复制 / 粘贴（让 agent 终端像真实终端一样支持 Ctrl+C / Ctrl+V）=====
    var clipboardReqId = 0;
    var clipboardPending = {};

    // 复制文本到系统剪贴板：优先 navigator.clipboard，失败回退到 textarea + execCommand（iframe 内更稳）
    function copyToClipboard(text) {
      return new Promise(function (resolve) {
        function fallback() {
          try {
            var ta = document.createElement("textarea");
            ta.value = text;
            ta.setAttribute("readonly", "");
            ta.style.position = "fixed";
            ta.style.top = "-1000px";
            ta.style.opacity = "0";
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            ta.setSelectionRange(0, ta.value.length);
            var ok = document.execCommand("copy");
            document.body.removeChild(ta);
            resolve(!!ok);
          } catch (e) {
            resolve(false);
          }
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text)
            .then(function () { resolve(true); })
            .catch(function () { fallback(); });
        } else {
          fallback();
        }
      });
    }

    // 从系统剪贴板读取文本：优先 navigator.clipboard.readText，
    // 失败（iframe 内剪贴板被限制）则通过父窗口代理读取。
    function readClipboard() {
      if (navigator.clipboard && navigator.clipboard.readText) {
        return navigator.clipboard.readText();
      }
      return new Promise(function (resolve, reject) {
        var id = ++clipboardReqId;
        clipboardPending[id] = { resolve: resolve, reject: reject };
        window.parent.postMessage({ type: "agent-read-clipboard", id: id }, "*");
        setTimeout(function () {
          if (clipboardPending[id]) {
            delete clipboardPending[id];
            reject(new Error("读取剪贴板超时"));
          }
        }, 5000);
      });
    }

    // ===== 终端实例 =====
    var term, fitAddon;
    var terminalStarted = false;
    var startRequested = false;
    // 上次启动 admAgent 时记录到的模型代次；只有模型被重启（代次变化）或进程退出时，
    // 再次进入 Agent 页才会重启 admAgent。上下文配置变化但模型未重启 → 不重启。
    var currentModelGen = null;
    // 当前 Agent 终端会话代次（由后端 agent-terminal-ready 事件下发）。
    // 后端每次 start_agent_terminal +1，并把该值随每帧 agent-terminal-data 一同推送。
    // 前端按该值过滤旧会话残留输出，结构上杜绝「同一输出显示两遍」：
    //   ready 到达前（currentAgentGen === null）放行（后端已保证旧线程在 spawn 前停掉）；
    //   ready 到达后严格按代次过滤，任何旧代次数据一律丢弃。
    var currentAgentGen = null;
    // 统一的 fit + resize 节流句柄：所有触发 fit 的入口都走 scheduleFitResize，
    // 避免多源（ResizeObserver / window resize / agent-resize / ready / startAgentNow）
    // 重复触发 fit + agent_terminal_resize，导致 ratatui 整屏重绘次数过多放大重复观感。
    var _fitResizeTimer = null;

    function goHome() {
      window.parent.postMessage({ type: "navigate", page: "model_list.html" }, "*");
    }

    // ===== 统一的 fit + resize 入口（带 trailing 节流）=====
    // 所有需要重新自适应尺寸的地方都调用本函数，避免多源重复触发：
    //   ResizeObserver（容器尺寸变化）、window resize、agent-resize 消息、
    //   agent-terminal-ready、startAgentNow 末尾。
    // delay=0 表示立即执行（首帧 / ready 时希望尽快纠正尺寸）；默认 120ms trailing 节流。
    // 每次 fit 后若拿到有效 rows/cols 才调用 agent_terminal_resize，避免无意义请求。
    function scheduleFitResize(delay) {
      if (_fitResizeTimer) clearTimeout(_fitResizeTimer);
      var d = (delay === undefined || delay === null) ? 120 : delay;
      var run = function () {
        _fitResizeTimer = null;
        if (!term || !fitAddon) return;
        try { fitAddon.fit(); } catch (_) {}
        if (term.rows > 0 && term.cols > 0) {
          invoke("agent_terminal_resize", { rows: term.rows, cols: term.cols }).catch(function () {});
        }
      };
      if (d <= 0) { run(); return; }
      _fitResizeTimer = setTimeout(run, d);
    }

    // ===== 通过 postMessage 接收主窗口转发的 Tauri 事件（与 model_list.html 相同模式）=====
    function setupMessageListener() {
      window.addEventListener("message", function (event) {
        var data = event.data;
        if (!data || !data.type) return;

        switch (data.type) {
          case "agent-terminal-data":
            if (data.payload && data.payload.data && term) {
              // 代次过滤：ready 到达后严格只接受当前代次的数据；
              // ready 尚未到达时（currentAgentGen === null）放行——后端已保证旧线程
              // 在 spawn 新会话前被停掉，此期间只有新会话数据。
              var gen = data.payload.gen;
              if (gen != null && currentAgentGen != null && gen !== currentAgentGen) {
                return; // 旧会话残留输出，丢弃
              }
              term.write(base64ToBytes(data.payload.data));
            }
            break;
          case "agent-terminal-exit":
            if (term) {
              term.write("\r\n\x1b[33m[admAgent 进程已退出，可重新进入 Agent 页面启动]\x1b[0m\r\n");
            }
            break;
          case "agent-terminal-ready":
            hideLoading();
            // 记录本会话代次：此后 data 事件按该值过滤旧会话残留输出
            if (data.payload && data.payload.gen != null) {
              currentAgentGen = data.payload.gen;
            }
            if (term) {
              // PTY 已就绪：立即 fit（delay=0）并把实际列/行同步给后端
              scheduleFitResize(0);
              term.focus();
            }
            window.parent.postMessage({ type: "agent-focus-me" }, "*");
            break;
          case "agent-clipboard-result": {
            // 父窗口代理读取剪贴板后回填结果
            var cp = clipboardPending[data.id];
            if (cp) {
              if (data.error) cp.reject(new Error(data.error));
              else cp.resolve(data.text);
              delete clipboardPending[data.id];
            }
            break;
          }
          case "agent-resize":
            // 父窗口切换显示 Agent 页面后的入口信号：
            //   1) 立即做尺寸适配与聚焦（delay=0，尽快纠正 PTY 宽度）；
            //   2) 调 handleEnterAgent 判断是否需要 (重)启动 admAgent（模型代次变化 / 进程已退出）。
            // 重复输出已由三层防护消除（后端回收旧读取线程 + 代次过滤 + catch 不再兜底重启），
            // 故此处保留重启判断是安全的，且为「返回 Agent 页时模型已重启」的必要入口。
            if (term) {
              scheduleFitResize(0);
              term.focus();
            }
            handleEnterAgent();
            break;
        }
      });
    }

    function hideLoading() {
      var ov = document.getElementById("loading-overlay");
      if (ov) ov.classList.add("hidden");
    }

    function showError(msg) {
      var ov = document.getElementById("loading-overlay");
      if (ov) {
        ov.innerHTML = '<div class="error-text">' + msg + '</div>';
      }
    }

    // ===== 启动终端（先检查工作目录）=====
    async function startTerminal() {
      if (startRequested) return;
      startRequested = true;
      // 进入页面先检查工作目录是否已配置
      try {
        var wd = await invoke("get_agent_workdir");
        if (!wd || !wd.trim()) {
          // 工作目录为空：必须先设置（不启动终端，允许下次重新触发）
          startRequested = false;
          hideLoading();
          openWorkdirDialog(true);
          return;
        }
      } catch (e) {
        startRequested = false;
        hideLoading();
        openWorkdirDialog(true);
        return;
      }
      startAgentNow();
    }

    // 每次进入 Agent 页面时调用：综合判断是否需要 (重)启动 admAgent。
    // 判据（后端 get_agent_status 为权威来源，不依赖前端可能过期的标记）：
    //   - 进程已退出（running=false，含崩溃）：需要重启
    //   - 模型代次变化（模型被重启过）：需要重启
    //   - 二者都没变（哪怕只是切换页面，或仅改了上下文配置但没重启模型）：保持原状，不重启
    // 注：本函数只在「真正进入 Agent 页」（iframe onload 后的首次 agent-resize 前后）
    //   与窗口缩放导致 iframe 首具可见尺寸时调用，不再由每次 agent-resize 触发，
    //   以避免 resize 与 restart 耦合导致无谓重启。
    async function handleEnterAgent() {
      try {
        var st = await invoke("get_agent_status");
        var alive = !!(st && st.running);
        var gen = st ? st.model_generation : null;

        var keep =
          alive &&
          terminalStarted &&
          gen === currentModelGen;
        if (keep) {
          // 进程存活且模型代次未变 → 不触碰原终端（上下文配置变化但模型未重启也不重启）
          return;
        }

        // 其余情形（进程已退出 / 模型重启过 / 从未启动）一律重新启动。
        // 但若前端已经请求启动但尚未完成（startRequested），避免 reset 导致并发启动两次。
        if (startRequested) return;
        terminalStarted = false;
        startRequested = false;
        startTerminal();
      } catch (e) {
        // 查询失败（如 mutex 中毒 / IPC 瞬时不可用）：不再兜底重启。
        // 之前的兜底会在「进程正在 spawn 的瞬时空窗」误判为未运行而二次拉起，
        // 导致两个 admAgent 并发写 PTY → 整屏重复。改为保守 return，等用户显式操作或下次进入。
      }
    }

    // 真正启动终端（工作目录已确认）
    // 注意：本函数从进入起就占用启动守卫 startRequested，覆盖整个异步启动窗口
    //（含 await start_agent_terminal），杜绝 handleEnterAgent / maybeStartTerminal
    // 在启动途中并发发起第二次 start_agent_terminal（会产生无法回收的孤儿 admAgent 进程）。
    // 调用方约定：startTerminal 检查守卫后进入；confirmWorkdir / restartAgentTerminal
    // 在停旧会话前先占用守卫再调本函数。
    async function startAgentNow() {
      startRequested = true;
      var ov = document.getElementById("loading-overlay");
      if (ov) {
        ov.classList.remove("hidden");
        ov.innerHTML = '<div class="spinner"></div><div class="loading-text">正在启动终端并加载 admAgent…</div>';
      }
      // 每次 (重)启动前清空终端旧内容（含上次的「进程已退出」提示）
      if (term) { try { term.reset(); } catch (_) {} }
      // 重置会话代次：直到新的 agent-terminal-ready 到达前，currentAgentGen 为 null
      //（data 事件在此期间放行，后端已保证旧线程在 spawn 前停掉，只有新会话数据）。
      currentAgentGen = null;
      try {
        // 关键：先按当前容器真实尺寸 fit，拿到真实 rows/cols，在「创建 PTY」时就传给后端。
        // 这样 admAgent 启动时读到的 PTY 宽度就是真实显示宽度，其 TUI（右边栏上下文实时统计）
        // 才不会按默认 120 列错位。（之前 PTY 写死 120 列，admAgent 按 120 布局，而实际显示更宽，
        // 且事后 agent_terminal_resize 于启动后才调用，admAent 已按旧宽度布局，故显示异常。）
        try { fitAddon.fit(); } catch (_) {}
        var initRows = term.rows > 0 ? term.rows : 30;
        var initCols = term.cols > 0 ? term.cols : 120;

        // 15 秒超时：防止后端 PTY 创建或进程 spawn 卡死
        await Promise.race([
          invoke("start_agent_terminal", { rows: initRows, cols: initCols }),
          new Promise(function (_, reject) {
            setTimeout(function () { reject(new Error("终端启动超时（15秒）")); }, 15000);
          })
        ]);
        hideLoading();
        terminalStarted = true;
        // 启动完成即释放启动守卫：终端进入「运行中」状态由 terminalStarted 表达；
        // 之后若进程退出，handleEnterAgent 才能再次进入重启流程（守卫滞留会堵死该路径）。
        startRequested = false;
        // 记录本次启动时的模型代次，模型重启后代次变化将触发 admAgent 重启
        invoke("get_agent_status")
          .then(function (st) { if (st) currentModelGen = st.model_generation; })
          .catch(function () {});
        // 兜底：再 fit + resize 一次（布局可能又变化），确保 PTY 与显示一致
        // 走统一节流入口，避免与 ready / ResizeObserver 的 fit 叠加重复
        scheduleFitResize(0);
      } catch (err) {
        startRequested = false;
        showError("终端启动失败：" + err);
      }
    }

    // 判断终端容器是否已有可见尺寸（用于在 iframe 初始隐藏时延迟启动）
    function isTerminalWrapVisible() {
      var wrap = document.getElementById("terminal-wrap");
      if (!wrap) return false;
      var rect = wrap.getBoundingClientRect();
      return rect.width > 0 && rect.height > 0;
    }

    // 若终端尚未启动且容器已可见，则触发启动；否则保持等待，直到 ResizeObserver 或父窗口
    // 的 agent-resize 消息在真正显示时通知我们。这是为了避免在 iframe 还是 display:none 时
    // 就创建 PTY，导致 xterm 取不到真实尺寸，admAgent 按错误宽度布局 TUI 右边栏。
    function maybeStartTerminal() {
      if (terminalStarted || startRequested) return;
      if (isTerminalWrapVisible()) {
        startTerminal();
      }
    }

    async function stopAndHome() {
      // Windows 平台：关闭 Windows Terminal 外部窗口
      if (await detectPlatform() === 'windows') {
        try { await invoke("stop_windows_terminal_agent"); } catch (_) {}
      }
      try { await invoke("stop_agent_terminal", {}); } catch (_) {}
      terminalStarted = false;
      startRequested = false;
      goHome();
    }

    // 重启 Agent 终端：先停旧会话再重新拉起 admAgent，使其重新加载 admAgent.json 的最新配置
    // （新增 / 修改云端模型后必须重启才能生效）。若终端当前未运行则跳过（下次启动自然加载新配置）。
    async function restartAgentTerminal() {
      // Windows 平台：重启 Windows Terminal 外部窗口
      if (await detectPlatform() === 'windows') {
        try { await invoke("stop_windows_terminal_agent"); } catch (_) {}
        // 短暂等待进程完全退出后再重新启动
        setTimeout(function () {
          invoke("launch_windows_terminal_agent").catch(function () {});
        }, 500);
        return;
      }
      
      // macOS / 其他平台：重启 PTY 终端
      try {
        var st = await invoke("get_agent_status");
        if (!(st && st.running)) return; // 未在运行：无需重启
      } catch (_) {
        return;
      }
      // 同 confirmWorkdir：先占用启动守卫再停旧会话，覆盖整个重启窗口
      startRequested = true;
      terminalStarted = false;
      try { await invoke("stop_agent_terminal", {}); } catch (_) {}
      startAgentNow();
    }

    // ===== 工作目录选择弹窗 =====
    var workdirRequired = false;

    function openWorkdirDialog(required) {
      workdirRequired = !!required;
      var overlay = document.getElementById("workdir-overlay");
      var input = document.getElementById("workdir-input");
      var cancelBtn = document.getElementById("workdir-cancel");
      var err = document.getElementById("workdir-error");
      if (err) err.textContent = "";
      // 预填当前已配置的值
      try {
        invoke("get_agent_workdir").then(function (wd) {
          if (input && wd) input.value = wd;
        }).catch(function () {});
      } catch (_) {}
      if (cancelBtn) cancelBtn.style.display = workdirRequired ? "none" : "";
      if (overlay) overlay.classList.add("show");
      if (input) setTimeout(function () { input.focus(); }, 50);
    }

    function closeWorkdirDialog() {
      var overlay = document.getElementById("workdir-overlay");
      if (overlay) overlay.classList.remove("show");
    }

    async function browseWorkdir() {
      try {
        var result = await invoke("plugin:dialog|open", {
          options: {
            directory: true,
            multiple: false,
            title: "选择 Agent 工作目录"
          }
        });
        if (result && typeof result === "string") {
          var input = document.getElementById("workdir-input");
          if (input) input.value = result;
        }
      } catch (e) {
        var err = document.getElementById("workdir-error");
        if (err) err.textContent = "打开选择器失败：" + e;
      }
    }

    // 防重复提交：确定按钮在异步保存 + 重启期间忽略后续点击（并发 start 会产生孤儿进程）
    var workdirConfirming = false;

    async function confirmWorkdir() {
      var input = document.getElementById("workdir-input");
      var err = document.getElementById("workdir-error");
      var val = input ? input.value.trim() : "";
      if (!val) {
        if (err) err.textContent = "工作目录不能为空";
        return;
      }
      // 双击 / 启动途中再次提交：直接忽略（启动中的会话仍使用旧目录，提示用户稍候）
      if (workdirConfirming) return;
      if (startRequested) {
        if (err) err.textContent = "终端正在启动中，请稍候再试";
        return;
      }
      workdirConfirming = true;
      try {
        await invoke("set_agent_workdir", { workdir: val });
        closeWorkdirDialog();

        // Windows 平台：重启 Windows Terminal 外部窗口以应用新工作目录
        if (await detectPlatform() === 'windows') {
          try { await invoke("stop_windows_terminal_agent"); } catch (_) {}
          setTimeout(function () {
            invoke("launch_windows_terminal_agent").catch(function () {});
          }, 500);
          return;
        }

        // macOS / 其他平台：重启 PTY 终端以应用新的工作目录
        // 先占用启动守卫再停旧会话：覆盖 stop + start 整个异步窗口，避免窗口期内
        // agent-resize / ResizeObserver 触发 handleEnterAgent 并发启动第二个 admAgent。
        startRequested = true;
        terminalStarted = false;
        try { await invoke("stop_agent_terminal", {}); } catch (_) {}
        startAgentNow();
      } catch (e) {
        if (err) err.textContent = "保存失败：" + e;
      } finally {
        workdirConfirming = false;
      }
    }

    // ===== 添加 / 编辑云端模型弹窗 =====
    // editingKey 为 null 表示「新增」模式；非 null 表示正在编辑该 key 的 provider
    var editingKey = null;
    // 缓存最近一次拉取的 provider 列表，供编辑回填使用
    var cloudProviderCache = [];
    // 提交中标记：防止确认按钮在异步保存期间被重复点击
    var cloudSubmitting = false;

    function openCloudDialog() {
      editingKey = null;
      var title = document.getElementById("cloud-title");
      var okBtn = document.getElementById("cloud-ok-btn");
      if (title) title.textContent = "添加云端模型";
      if (okBtn) okBtn.textContent = "确认添加";

      // 重置提交态：允许重新提交并恢复按钮可用
      cloudSubmitting = false;
      setCloudButtonsDisabled(false);

      var overlay = document.getElementById("cloud-overlay");
      var msg = document.getElementById("cloud-msg");
      if (msg) { msg.textContent = ""; msg.className = "cloud-msg"; }
      // 清空输入并预填默认值（上下文大小 256K = 256000）
      document.getElementById("cloud-name").value = "";
      document.getElementById("cloud-base-url").value = "";
      document.getElementById("cloud-api-key").value = "";
      var ctx = document.getElementById("cloud-ctx");
      if (ctx) ctx.value = "256000";
      if (overlay) overlay.classList.add("show");
      var nameInput = document.getElementById("cloud-name");
      if (nameInput) setTimeout(function () { nameInput.focus(); }, 50);
    }

    function closeCloudDialog() {
      var overlay = document.getElementById("cloud-overlay");
      if (overlay) overlay.classList.remove("show");
    }

    // 解析上下文大小：支持纯数字、以及带 K（×1000）/ M（×1000000）后缀。
    // 默认 256K = 256000，与 admAgent.json 示例一致。
    function parseContextSize(raw) {
      if (raw === null || raw === undefined) return null;
      var s = String(raw).trim().toLowerCase().replace(/\s+/g, "");
      if (!s) return null;
      var mult = 1;
      if (s.endsWith("k")) { mult = 1000; s = s.slice(0, -1); }
      else if (s.endsWith("m")) { mult = 1000000; s = s.slice(0, -1); }
      var n = Number(s);
      if (!isFinite(n) || n <= 0) return null;
      return Math.round(n * mult);
    }

    // 设置/恢复添加/编辑弹窗底部按钮的禁用态（提交期间禁用，避免重复点击）
    function setCloudButtonsDisabled(disabled) {
      var okBtn = document.getElementById("cloud-ok-btn");
      var cancelBtn = document.querySelector("#cloud-overlay .btn-cancel");
      if (okBtn) okBtn.disabled = disabled;
      if (cancelBtn) cancelBtn.disabled = disabled;
    }
    // 结束一次提交：恢复标记与按钮（用于校验失败 / 保存失败时允许用户重试）
    function finishCloudSubmit() {
      cloudSubmitting = false;
      setCloudButtonsDisabled(false);
    }

    async function confirmCloudModel() {
      var msg = document.getElementById("cloud-msg");
      function setMsg(text, kind) {
        if (msg) { msg.textContent = text; msg.className = "cloud-msg" + (kind ? " " + kind : ""); }
      }

      // 防重复点击：若已在提交中，直接忽略本次点击
      if (cloudSubmitting) return;
      cloudSubmitting = true;
      setCloudButtonsDisabled(true);

      var name = (document.getElementById("cloud-name").value || "").trim();
      var baseUrl = (document.getElementById("cloud-base-url").value || "").trim();
      var apiKey = (document.getElementById("cloud-api-key").value || "").trim();
      var ctxRaw = (document.getElementById("cloud-ctx").value || "").trim();

      if (!name) { setMsg("请填写模型名称", "error"); finishCloudSubmit(); return; }
      if (!baseUrl) { setMsg("请填写 Base URL", "error"); finishCloudSubmit(); return; }
      if (!/^https?:\/\//i.test(baseUrl)) { setMsg("Base URL 需以 http:// 或 https:// 开头", "error"); finishCloudSubmit(); return; }
      if (!apiKey) { setMsg("请填写 API Key", "error"); finishCloudSubmit(); return; }
      var ctx = parseContextSize(ctxRaw);
      if (ctx === null) { setMsg("上下文大小无效（例如 256000 或 256K）", "error"); finishCloudSubmit(); return; }

      setMsg("正在保存…", "");
      try {
        var res;
        if (editingKey) {
          res = await invoke("update_cloud_provider", {
            key: editingKey,
            input: {
              name: name,
              base_url: baseUrl,
              api_key: apiKey,
              context_window: ctx
            }
          });
        } else {
          res = await invoke("add_cloud_provider", {
            input: {
              name: name,
              base_url: baseUrl,
              api_key: apiKey,
              context_window: ctx
            }
          });
        }
        var key = res && res.key ? res.key : name;
        setMsg((editingKey ? "已更新云端模型：" : "已添加云端模型：") + key + "（新配置将在 Agent 终端重启后生效）", "success");
        // 清空输入，短暂展示成功提示后（0.6s）立即关闭弹窗并重启 Agent 终端
        document.getElementById("cloud-name").value = "";
        document.getElementById("cloud-base-url").value = "";
        document.getElementById("cloud-api-key").value = "";
        setTimeout(function () {
          closeCloudDialog();
          closeManageDialog();
          restartAgentTerminal();
        }, 600);
        // 成功后按钮保持禁用（窗口即将关闭并重启），无需 finishCloudSubmit 恢复
      } catch (e) {
        setMsg((editingKey ? "更新失败：" : "添加失败：") + (e && e.message ? e.message : e), "error");
        finishCloudSubmit(); // 恢复按钮，允许用户修正后重试
      }
    }

    // ===== 模型管理弹窗 =====
    function closeManageDialog() {
      var overlay = document.getElementById("manage-overlay");
      if (overlay) overlay.classList.remove("show");
    }

    async function openManageDialog() {
      editingKey = null;
      var overlay = document.getElementById("manage-overlay");
      var list = document.getElementById("manage-list");
      if (list) list.innerHTML = '<div class="manage-empty">加载中…</div>';
      if (overlay) overlay.classList.add("show");
      try {
        cloudProviderCache = await invoke("list_cloud_providers", {});
      } catch (e) {
        cloudProviderCache = [];
        if (list) list.innerHTML = '<div class="manage-empty">加载失败：' + (e && e.message ? e.message : e) + '</div>';
        return;
      }
      renderManageList();
    }

    function renderManageList() {
      var list = document.getElementById("manage-list");
      if (!list) return;
      list.innerHTML = "";
      if (!cloudProviderCache || cloudProviderCache.length === 0) {
        list.innerHTML = '<div class="manage-empty">暂无已添加的云端模型</div>';
        return;
      }
      cloudProviderCache.forEach(function (p) {
        var item = document.createElement("div");
        item.className = "manage-item";

        var name = document.createElement("span");
        name.className = "mi-name";
        name.textContent = p.name || p.key;
        item.appendChild(name);

        var meta = document.createElement("span");
        meta.className = "mi-meta";
        meta.textContent = (p.context_window ? p.context_window + " tokens" : "") +
          (p.base_url ? " · " + p.base_url : "");
        item.appendChild(meta);

        var editBtn = document.createElement("button");
        editBtn.textContent = "编辑";
        editBtn.addEventListener("click", function () { openCloudEdit(p.key); });
        item.appendChild(editBtn);

        var deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "删除";
        deleteBtn.addEventListener("click", function () { confirmDeleteCloudProvider(p.key, p.name || p.key); });
        item.appendChild(deleteBtn);

        list.appendChild(item);
      });
    }

    // 确认删除云端模型 Provider
    function confirmDeleteCloudProvider(key, name) {
      var msg = '确定要删除云端模型「' + name + '」吗？此操作不可恢复。';
      if (!window.confirm(msg)) return;
      deleteCloudProvider(key);
    }

    // 调用后端删除云端模型 Provider
    async function deleteCloudProvider(key) {
      try {
        await invoke("delete_cloud_provider", { key: key });
        // 删除成功后刷新列表
        closeManageDialog();
        openManageDialog();
        // 重启 Agent 终端以应用新配置
        restartAgentTerminal();
      } catch (e) {
        alert('删除失败：' + (e && e.message ? e.message : e));
      }
    }

    // 以指定 key 的 provider 数据回填表单，进入「编辑」模式
    function openCloudEdit(key) {
      var prov = null;
      for (var i = 0; i < cloudProviderCache.length; i++) {
        if (cloudProviderCache[i].key === key) { prov = cloudProviderCache[i]; break; }
      }
      if (!prov) return;

      editingKey = key;
      var title = document.getElementById("cloud-title");
      var okBtn = document.getElementById("cloud-ok-btn");
      if (title) title.textContent = "编辑云端模型";
      if (okBtn) okBtn.textContent = "保存修改";

      // 重置提交态：允许重新提交并恢复按钮可用
      cloudSubmitting = false;
      setCloudButtonsDisabled(false);

      document.getElementById("cloud-name").value = prov.name || "";
      document.getElementById("cloud-base-url").value = prov.base_url || "";
      document.getElementById("cloud-api-key").value = prov.api_key || "";
      document.getElementById("cloud-ctx").value = prov.context_window ? String(prov.context_window) : "256000";

      var msg = document.getElementById("cloud-msg");
      if (msg) { msg.textContent = ""; msg.className = "cloud-msg"; }

      // 关闭管理弹窗，打开编辑表单
      closeManageDialog();
      var overlay = document.getElementById("cloud-overlay");
      if (overlay) overlay.classList.add("show");
      setTimeout(function () { document.getElementById("cloud-name").focus(); }, 50);
    }

    // ===== Windows Terminal 状态页面 =====
    var _wtLaunched = false; // 防止重复启动
    function initWindowsTerminalStatus() {
      var wrap = document.getElementById('terminal-wrap');
      if (!wrap) return;
      
      // 隐藏 loading overlay
      hideLoading();
      
      // 显示状态信息
      wrap.innerHTML = [
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;',
        '  height:100%;padding:40px;text-align:center;color:#e0e0e0;">',
        '  <div style="font-size:48px;margin-bottom:16px;">🤖</div>',
        '  <div style="font-size:18px;font-weight:600;margin-bottom:8px;">Agent 终端已启动</div>',
        '  <div style="font-size:14px;color:#9090b0;margin-bottom:24px;line-height:1.6;">',
        '    Windows Terminal 已在外部窗口中启动。<br>',
        '    请在 Windows Terminal 窗口中与 admAgent 交互。',
        '  </div>',
        '  <button onclick="reopenWindowsTerminal()" style="',
        '    background:#6c63ff;color:#fff;border:none;padding:10px 24px;',
        '    border-radius:6px;font-size:14px;cursor:pointer;">',
        '    重新打开终端',
        '  </button>',
        '</div>'
      ].join('');
    }

    // 自动启动 Windows Terminal（防止重复启动）
    async function autoLaunchWindowsTerminal() {
      if (_wtLaunched) return;
      _wtLaunched = true;
      try {
        await invoke("launch_windows_terminal_agent");
      } catch (e) {
        _wtLaunched = false;
        alert("启动 Windows Terminal 失败: " + e);
      }
    }

    // 重新打开 Windows Terminal
    async function reopenWindowsTerminal() {
      try {
        await invoke("launch_windows_terminal_agent");
      } catch (e) {
        alert("启动失败: " + e);
      }
    }

    // ===== 初始化 =====
    async function initTerminal() {
      // 平台检测：Windows 使用外部 WT，其他平台使用内嵌 xterm.js
      var platform = await detectPlatform();
      if (platform === 'windows') {
        initWindowsTerminalStatus();
        // 自动启动 Windows Terminal
        autoLaunchWindowsTerminal();
        return;
      }

      term = new Terminal({
        fontFamily: 'Menlo, Consolas, "DejaVu Sans Mono", monospace',
        fontSize: 13,
        cursorBlink: true,
        theme: {
          background: "#13131f",
          foreground: "#e0e0e0",
          cursor: "#6c63ff",
          selectionBackground: "rgba(108,99,255,0.3)",
          black: "#13131f",
          brightBlack: "#555",
        },
      });
      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById("terminal"));

      // ===== 修复 xterm.js 在 Windows WebView2 + 中文 IME 下的偶发重复输入 =====
      // 现象：中文输入法偶发把合成结果发两次（"你好"→"你好你好"），且时有时无。
      // 根因：xterm 在 IME 合成结束时存在两条可能同时触发的发送路径——
      //   (A) compositionend → _finalizeComposition 用 setTimeout(0) 异步 triggerDataEvent；
      //   (B) 紧跟 compositionend 的 input(insertText) 事件，_inputEvent 在纯 IME 选词
      //       （_keyDownSeen=false）时绕过保护，同步 triggerDataEvent。
      //   两条路径发出同一段合成文本 → onData 被触发两次。混入普通 keydown 时不复现 → 偶发。
      // 方案 v3：三重防线 ——
      //   防线 0（源头拦截，确定性）：compositionend 之后浏览器会同步派发一个
      //     input(insertText) 事件（即路径 B）。在 document 捕获阶段监听 input，
      //     若目标为 xterm 辅助 textarea、文本与刚结束的合成完全一致且距 compositionend
      //     不到 500ms，stopImmediatePropagation() 吞掉它——xterm 注册在 textarea 上的
      //     _inputEvent 根本不会触发。只保留路径 A（setTimeout finalize）这唯一一次发送。
      //     compositionend→input 的顺序与同步性由浏览器保证，因此本防线不依赖任何调度时延，
      //     即便主线程拥塞也必然命中。（input 事件内容已写入 textarea，吞事件不影响路径 A 读取。）
      //   防线 1（compositionend 文本去重，安全网）：捕获阶段记录合成的确切文本与时间。
      //     onData 中首次见到该文本放行；2000ms 窗口内再次见到判定为双路径重复丢弃一次，
      //     并立即清空记录（每次 compositionend 最多只丢一次，之后相同内容如恰好粘贴同样
      //     文本一律放行）。窗口取 2000ms 是因为终端重启（设置工作目录 / 增删云端模型）后
      //     TUI 首屏整帧渲染会拥塞主线程，setTimeout(0) 可能延迟数百毫秒，原 250ms 窗口
      //     在该场景下会漏判——这正是「设置完工作目录后偶发重复」的直接原因。
      //   防线 2（通用相邻去重，兜底）：若连续两次 onData 收到完全相同的文本且间隔 <150ms
      //     且刚发生过 IME 合成活动（600ms 内），也视为重复丢弃。覆盖前两道未命中的边界情况，
      //     同时不误伤真实相同短语（人类再选词一次远超 150ms）。
      // 三道防线均仅丢弃重复副本，唯一发送永远放行；粘贴走 _suppressImeDedup 绕过去重，绝不丢字。
      var _imeLastActivity = 0;        // 最近一次 IME 合成活动时间戳
      var _lastComposedText = "";      // 最近一次 compositionend 的合成文本
      var _lastComposedAt = 0;         // compositionend 时刻
      var _composedSent = false;       // 当前合成文本是否已经合法发送过一次
      var _lastSentData = "";          // 上一条实际发出的数据
      var _lastSentAt = 0;             // 发出时刻
      var _suppressImeDedup = false;   // 粘贴期间为 true：粘贴内容不参与 IME 去重
      (function trackImeComposition() {
        var isHelperTA = function (t) {
          return !!(t && t.classList && t.classList.contains("xterm-helper-textarea"));
        };
        var mark = function (e) { if (isHelperTA(e.target)) _imeLastActivity = Date.now(); };
        var onEnd = function (e) {
          if (!isHelperTA(e.target)) return;
          _imeLastActivity = Date.now();
          // compositionend 标志新一轮去重：记录本次合成文本，重置已发送标记
          _lastComposedText = e.data || "";
          _lastComposedAt = Date.now();
          _composedSent = false;
        };
        document.addEventListener("compositionstart", mark, true);
        document.addEventListener("compositionupdate", mark, true);
        document.addEventListener("compositionend", onEnd, true);
        // 防线 0：吞掉 compositionend 后紧跟的冗余 input(insertText) 事件（xterm 双路径中的
        // 同步路径 B）。匹配条件与 xterm _inputEvent 的发送条件对齐（inputType === "insertText"），
        // 并要求文本与刚结束的合成严格一致——普通按键 input 事件的 data 不可能等于整段合成文本，
        // 不会误伤正常输入；不匹配时事件原样透传，无任何副作用。
        document.addEventListener("input", function (e) {
          if (!isHelperTA(e.target)) return;
          if (!_lastComposedText) return;
          if (e.inputType !== "insertText") return;
          if (!e.data || e.data !== _lastComposedText) return;
          if (Date.now() - _lastComposedAt > 500) return;
          e.stopImmediatePropagation();
        }, true);
      })();

      // ===== 粘贴预处理：将换行符替换为空格 =====
      // 多行文本粘贴时，换行符（\r\n / \n / \r）会被 PTY 当作 Enter 键，
      // 导致 admAgent 输入被提前提交。覆写 term.paste 拦截所有粘贴路径
      //（Ctrl+V、右键菜单、中键粘贴等），统一把换行替换为空格。
      var _originalPaste = term.paste.bind(term);
      term.paste = function (text) {
        if (text) {
          text = text.replace(/\r\n/g, ' ').replace(/\r/g, ' ').replace(/\n/g, ' ');
        }
        // 粘贴内容不参与 IME 去重：若粘贴文本恰好等于刚合成的文本，防线 1/2 会误丢这次粘贴。
        // triggerDataEvent 是同步调用 onData 的，try/finally 可精确圈定抑制范围。
        _suppressImeDedup = true;
        try { _originalPaste(text); } finally { _suppressImeDedup = false; }
      };

      // ===== Ctrl+C / Ctrl+V 复制粘贴（模拟真实终端体验）=====
      // - 有选区时 Ctrl+C 复制，无选区时放行（把 SIGINT 发给 agent，等价于终端中断）
      // - Ctrl+V 从系统剪贴板读取并粘贴到终端
      term.attachCustomKeyEventHandler(function (e) {
        if (e.type !== "keydown") return true;
        var mod = e.ctrlKey || e.metaKey;
        if (!mod) return true;

        var k = (e.key || "").toLowerCase();
        // 复制：仅在有选区时拦截；无选区则交还给 xterm（Ctrl+C 作为中断信号，Cmd+C 在 Mac 上不发送）
        if (k === "c" && (e.ctrlKey || e.metaKey)) {
          var sel = term.getSelection();
          if (sel && sel.length > 0) {
            copyToClipboard(sel);
            e.preventDefault();
            return false; // 已处理，阻止默认（否则会触发 SIGINT）
          }
          return true; // 无选区：放行
        }
        // 粘贴
        if (k === "v" && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          readClipboard()
            .then(function (text) {
              if (text) term.paste(text);
            })
            .catch(function () {
              try { term.write("\r\n\x1b[31m[粘贴失败：无法访问剪贴板]\x1b[0m\r\n"); } catch (_) {}
            });
          return false; // 已处理
        }
        return true;
      });

      // ===== 鼠标滚轮 → PTY 转发 =====
      // admAgent 是 Rust TUI（crossterm/ratatui）。实测其滚动逻辑不接收 SGR 鼠标报文，
      // 但方向键（↑/↓）可以正常滚动；故把滚轮翻译成方向键序列写入 PTY：
      //   滚轮上 → \x1b[A（上），滚轮下 → \x1b[B（下）。
      // window 捕获阶段拦截 wheel 并 stopPropagation，阻止 xterm 自身处理；
      // 仅对 wheel 生效，不影响点击 / 拖选等其它鼠标事件。
      var _wheelAccum = 0;
      window.addEventListener("wheel", function (e) {
        if (!term) return;
        e.preventDefault();
        e.stopPropagation();

        // 统一把 deltaY 换算成像素，兼容行(1)/页(2) deltaMode；
        // 跨过一行阈值（≈24px）才发一次，避免触控板产生的大量微事件刷屏 PTY。
        var dy = e.deltaY;
        if (e.deltaMode === 1) dy *= 16;
        else if (e.deltaMode === 2) dy *= 480;
        _wheelAccum += dy;
        var STEP = 24;
        while (Math.abs(_wheelAccum) >= STEP) {
          var down = _wheelAccum > 0;
          _wheelAccum -= down ? STEP : -STEP;
          var keySeq = down ? "\x1b[B" : "\x1b[A"; // ↓ CursorDown : ↑ CursorUp
          invoke("agent_terminal_input", { data: bytesToBase64(encoder.encode(keySeq)) })
            .catch(function () {});
        }
      }, { capture: true, passive: false });

      // 用 ResizeObserver 兜底尺寸适配：容器（首次显示、窗口缩放、布局变化）任意尺寸变化都重新 fit。
      // 关键：当终端尚未启动时，ResizeObserver 检测到容器从无尺寸变为有尺寸，说明 iframe 已经
      // 真正显示，此时应立即启动终端。这样可保证 PTY 创建时 xterm 已拿到真实尺寸，避免 admAgent
      // 在 iframe 还是 display:none 时按错误宽度布局 TUI 右边栏。
      // 所有 fit + resize 走统一节流入口 scheduleFitResize，避免多源重复触发 TUI 整屏重绘。
      var roWrap = document.getElementById("terminal-wrap");
      if (roWrap && typeof ResizeObserver !== "undefined") {
        var ro = new ResizeObserver(function () {
          scheduleFitResize(120);
          // 如果终端还没启动，且容器现在已有可见尺寸，说明 iframe 已显示，可以安全启动。
          // 注意：仅触发启动判断，不在 resize 路径里直接调 handleEnterAgent（已从 agent-resize 解耦）。
          maybeStartTerminal();
        });
        ro.observe(roWrap);
      }

      // iframe 内嵌时键盘焦点容易丢失，主动聚焦 + 点击聚焦
      term.focus();
      window.parent.postMessage({ type: "agent-focus-me" }, "*");
      var termWrap = document.getElementById("terminal-wrap");
      if (termWrap) {
        termWrap.addEventListener("mousedown", function () { term.focus(); window.parent.postMessage({ type: "agent-focus-me" }, "*"); });
        termWrap.tabIndex = -1;
      }

      // 记录上一次实际转发给后端的数据与时间，用于 IME 合成去重（见上方 trackImeComposition）
      term.onData(function (data) {
        var now = Date.now();
        if (!_suppressImeDedup) {
          // 防线 1：compositionend 文本去重（安全网，源头拦截未覆盖时兜底）。
          // xterm 双路径（setTimeout(0) + input 事件）会发出同一段合成文本，这里在 onData 出口拦截：
          //   - 第一次见到该合成文本 → 放行（标记 _composedSent = true）
          //   - 2000ms 窗口内再次见到相同文本 → 判定为重复，丢弃【仅一次】并清空合成记录
          // 窗口取 2000ms：终端重启后 TUI 首屏整帧渲染会拥塞主线程，setTimeout(0) 可能延迟
          // 数百毫秒才触发，原 250ms 窗口在该场景下漏判（「设置完工作目录后偶发重复」的根因）。
          // 丢弃后立刻清空 _lastComposedText：每次 compositionend 最多只丢一个副本，
          // 之后相同内容（如恰好粘贴同样文本）一律放行，不会过度拦截。
          if (data &&
              _lastComposedText &&
              data === _lastComposedText &&
              now - _lastComposedAt < 2000) {
            if (_composedSent) {
              _lastComposedText = ""; // 只丢一次，防止误伤后续合法的相同输入
              _lastSentAt = now;
              return;
            }
            // 首次见到 → 合法发送
            _composedSent = true;
          }
          // 防线 2：通用相邻去重（兜底）。
          // 连续两次 onData 收到完全相同文本、间隔 <150ms、且 600ms 内发生过 IME 合成
          // 活动时也判定为重复。覆盖防线 1 未命中的边界情况，
          // 同时不误伤真实相同短语（人类再选词远超 150ms）。
          if (data &&
              data === _lastSentData &&
              now - _lastSentAt < 150 &&
              now - _imeLastActivity < 600) {
            _lastSentAt = now;
            return;
          }
        }
        _lastSentData = data;
        _lastSentAt = now;
        invoke("agent_terminal_input", { data: bytesToBase64(encoder.encode(data)) })
          .catch(function (e) {
            // 输入失败时在终端内短暂提示，便于排查
            try { term.write("\r\n\x1b[31m[输入发送失败: " + e + "]\x1b[0m\r\n"); } catch (_) {}
          });
      });

      // 监听主窗口通过 postMessage 转发的 Tauri 事件
      setupMessageListener();

      window.addEventListener("resize", function () {
        // 走统一节流入口，与 ResizeObserver / agent-resize / ready 共用同一去重定时器
        scheduleFitResize(120);
        // 若窗口缩放导致 iframe 首次具备可见尺寸，也尝试启动终端
        maybeStartTerminal();
      });

      // 初始化时：若 iframe 已可见（如用户刷新后仍停留在 Agent 页），直接启动；
      // 若仍在 display:none 中（最常见情况），交给 ResizeObserver / agent-resize 消息触发。
      maybeStartTerminal();
    }

    window.addEventListener("DOMContentLoaded", initTerminal);
  </script>
</body>
</html>
