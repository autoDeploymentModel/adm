name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'ADM v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: macOS 自签名
        if: matrix.platform == 'macos-latest'
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            echo "对应用进行自签名: $APP_PATH"
            xattr -cr "$APP_PATH"
            codesign --force --deep --sign - --entitlements src-tauri/entitlements.plist "$APP_PATH"
            codesign -vvv "$APP_PATH"
          fi

      - name: Windows 自签名
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $ExePath = Get-ChildItem -Path "src-tauri\target\release" -Filter "*.exe" | Select-Object -First 1 -ExpandProperty FullName
          if ($ExePath) {
            Write-Host "创建自签名证书"
            $Cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ADM Self-Signed Cert" -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(10)
            Write-Host "对可执行文件签名: $ExePath"
            Set-AuthenticodeSignature -FilePath $ExePath -Certificate $Cert -HashAlgorithm SHA256
            Get-AuthenticodeSignature -FilePath $ExePath | Format-List
          }
