name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 仅打包 Windows x64 安装包 (x64-setup.exe / NSIS)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          # 仅打包 macOS aarch64 磁盘镜像 (aarch64.dmg)
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'ADM v__VERSION__'
          releaseDraft: false
          prerelease: false
          # 每个平台只产出指定格式的包，发布里仅保留 x64-setup.exe 与 aarch64.dmg
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: macOS 自签名
        if: matrix.platform == 'macos-latest'
        run: |
          APP_PATH=$(find src-tauri/target/release/bundle/macos -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            echo "对应用进行自签名: $APP_PATH"
            
            echo "1. 深度清理隔离属性..."
            xattr -cr "$APP_PATH"
            
            echo "2. 签名所有可执行文件..."
            find "$APP_PATH" -type f -perm +111 -exec codesign --force --sign - --entitlements src-tauri/entitlements.plist {} \; 2>/dev/null
            
            echo "3. 主程序签名（启用 runtime）..."
            codesign --force --deep --sign - --entitlements src-tauri/entitlements.plist --options runtime "$APP_PATH"
            
            echo "4. 再次清理隔离属性..."
            xattr -cr "$APP_PATH"
            
            echo "5. 验证签名..."
            codesign -vvv "$APP_PATH"
          fi

      - name: Windows 自签名
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          Write-Host "创建自签名证书"
          $Cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=ADM Self-Signed Cert" -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(10)
          Write-Host "证书指纹: $($Cert.Thumbprint)"

          # 签名 NSIS 安装包（发布产物 x64-setup.exe，实际位于 bundle/nsis 目录）
          $Setup = Get-ChildItem -Path "src-tauri\target" -Recurse -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($Setup) {
            Write-Host "对安装包签名: $($Setup.FullName)"
            Set-AuthenticodeSignature -FilePath $Setup.FullName -Certificate $Cert -HashAlgorithm SHA256
            Get-AuthenticodeSignature -FilePath $Setup.FullName | Format-List
          } else {
            Write-Warning "未找到 *-setup.exe，安装包未被签名"
          }

          # 同时签名主程序二进制（release 目录下的 ADM.exe，便于直接分发）
          $App = Get-ChildItem -Path "src-tauri\target" -Recurse -Filter "ADM.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($App) {
            Write-Host "对主程序签名: $($App.FullName)"
            Set-AuthenticodeSignature -FilePath $App.FullName -Certificate $Cert -HashAlgorithm SHA256
            Get-AuthenticodeSignature -FilePath $App.FullName | Format-List
          } else {
            Write-Warning "未找到 ADM.exe"
          }
